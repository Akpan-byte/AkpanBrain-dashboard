// ═══ THREE.JS INIT ═══
function init3D(){
var gl=document.getElementById('gl');
var bm=document.getElementById('bloom');
renderer=new THREE.WebGLRenderer({canvas:gl,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setClearColor(0x060610,1);

bloomRenderer=new THREE.WebGLRenderer({canvas:bm,antialias:false,alpha:true});
bloomRenderer.setPixelRatio(1);
bloomRenderer.setSize(window.innerWidth,window.innerHeight);
bloomRenderer.setClearColor(0x000000,0);

scene=new THREE.Scene();
bloomScene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,6,14);

controls=new THREE.OrbitControls(camera,gl);
controls.enableDamping=true;
controls.dampingFactor=0.05;
controls.autoRotate=true;
controls.autoRotateSpeed=0.4;
controls.minDistance=3;
controls.maxDistance=40;

// Lights
scene.add(new THREE.AmbientLight(0x222244,0.5));
var dl=new THREE.DirectionalLight(0x00f0ff,0.3);dl.position.set(5,10,5);scene.add(dl);
var pl=new THREE.PointLight(0xff003c,0.5,20);pl.position.set(-5,3,-5);scene.add(pl);
bloomScene.add(new THREE.AmbientLight(0xffffff,1));

buildStarfield();
buildGrid();
updateNeurons();

window.addEventListener('resize',onResize);
animate();
}

function onResize(){
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
bloomRenderer.setSize(window.innerWidth,window.innerHeight);
}

// ═══ STARFIELD ═══
function buildStarfield(){
var geo=new THREE.BufferGeometry();
var n=2000,pos=[];
for(var i=0;i<n;i++){
pos.push((Math.random()-0.5)*100,(Math.random()-0.5)*100,(Math.random()-0.5)*100);
}
geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
var mat=new THREE.PointsMaterial({color:0x4488aa,size:0.15,transparent:true,opacity:0.7});
starField=new THREE.Points(geo,mat);
scene.add(starField);
}

// ═══ HOLOGRAPHIC GRID ═══
function buildGrid(){
var geo=new THREE.PlaneGeometry(40,40,40,40);
var mat=new THREE.MeshBasicMaterial({color:0x00f0ff,wireframe:true,transparent:true,opacity:0.03});
gridFloor=new THREE.Mesh(geo,mat);
gridFloor.rotation.x=-Math.PI/2;
gridFloor.position.y=-5;
scene.add(gridFloor);
}

// ═══ 3D NEURONS ═══
function updateNeurons(){
var count=agents.length;
if(count===0)return;
neuronPositions=[];
agents.forEach(function(a,i){
var phi=Math.acos(-1+(2*i)/count);
var theta=Math.sqrt(count*Math.PI)*phi;
var r=4+Math.random()*3;
neuronPositions.push(new THREE.Vector3(r*Math.cos(theta)*Math.sin(phi),r*Math.sin(theta)*Math.sin(phi)-1,r*Math.cos(phi)));
});
if(neuronMesh){scene.remove(neuronMesh);bloomScene.remove(bloomScene.children.find(function(c){return c.isInstancedMesh}))}
var icoGeo=new THREE.IcosahedronGeometry(0.35,1);
var icoMat=new THREE.MeshPhongMaterial({transparent:true,opacity:0.85,shininess:120});
neuronMesh=new THREE.InstancedMesh(icoGeo,icoMat,count);
var dummy=new THREE.Object3D();
var color=new THREE.Color();
agents.forEach(function(a,i){
dummy.position.copy(neuronPositions[i]);
var s=a.running?1.2:a.installed?0.6:0.35;
dummy.scale.set(s,s,s);
dummy.updateMatrix();
neuronMesh.setMatrixAt(i,dummy.matrix);
color.set(a.color||'#888888');
neuronMesh.setColorAt(i,color);
});
neuronMesh.instanceMatrix.needsUpdate=true;
if(neuronMesh.instanceColor)neuronMesh.instanceColor.needsUpdate=true;
scene.add(neuronMesh);

var bloomMesh=neuronMesh.clone();
bloomMesh.material=icoMat.clone();
bloomMesh.material.opacity=1.0;
bloomScene.add(bloomMesh);

updateSynapses();
}

// ═══ SYNAPSES ═══
function updateSynapses(){
if(synapseLines){scene.remove(synapseLines)}
var positions=[],colors=[];
var c=new THREE.Color();
agents.forEach(function(a,i){
agents.forEach(function(b,j){
if(i>=j)return;
var connected=false;
if(a.type==='orchestrator'||b.type==='orchestrator')connected=true;
if(a.type==='router'||b.type==='router')connected=true;
if(a.running&&b.running)connected=true;
if(connected&&neuronPositions[i]&&neuronPositions[j]){
positions.push(neuronPositions[i].x,neuronPositions[i].y,neuronPositions[i].z);
positions.push(neuronPositions[j].x,neuronPositions[j].y,neuronPositions[j].z);
var isPulse=a.running&&b.running;
c.set(isPulse?'#00f0ff':'#ff003c');
colors.push(c.r,c.g,c.b);
c.set(isPulse?'#00f0ff':'#ff003c');
colors.push(c.r,c.g,c.b);
}
});
});
if(positions.length===0)return;
var geo=new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
var mat=new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.2});
synapseLines=new THREE.LineSegments(geo,mat);
scene.add(synapseLines);
}

// ═══ FOCUS CAMERA ═══
function focusAgent(name){
var idx=agents.findIndex(function(a){return a.name===name});
if(idx<0||!neuronPositions[idx])return;
var pos=neuronPositions[idx];
targetCamPos=new THREE.Vector3(pos.x+3,pos.y+2,pos.z+3);
camLerp=0;
var label=document.getElementById('focus-label');
label.textContent=name.toUpperCase()+' — '+agents[idx].type.toUpperCase();
label.classList.add('show');
setTimeout(function(){label.classList.remove('show')},2500);
}

// ═══ RAYCASTER — CLICK ON 3D NEURONS ═══
var raycaster=new THREE.Raycaster();
var mouse=new THREE.Vector2();
document.getElementById('gl').addEventListener('click',function(e){
if(currentTab!=='3d')return;
var rect=renderer.domElement.getBoundingClientRect();
mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
raycaster.setFromCamera(mouse,camera);
if(!neuronMesh)return;
var hits=raycaster.intersectObject(neuronMesh);
if(hits.length>0){
var idx=hits[0].instanceId;
if(idx>=0&&idx<agents.length)focusAgent(agents[idx].name);
}
});

// ═══ ANIMATE ═══
function animate(){
requestAnimationFrame(animate);
var dt=clock.getDelta();
pulseTime+=dt;

if(targetCamPos){
camLerp+=dt*0.8;
camera.position.lerp(targetCamPos,Math.min(camLerp,1)*0.05);
if(camLerp>3)targetCamPos=null;
}

if(neuronMesh){
var dummy=new THREE.Object3D();
agents.forEach(function(a,i){
if(!neuronPositions[i])return;
dummy.position.copy(neuronPositions[i]);
var base=a.running?1.2:a.installed?0.6:0.35;
var s=base;
if(a.running){s=base+Math.sin(pulseTime*3+i)*0.12;}
dummy.position.y+=Math.sin(pulseTime*0.5+i*0.7)*0.1;
dummy.scale.set(s,s,s);
dummy.rotation.y=pulseTime*0.3+i;
dummy.updateMatrix();
neuronMesh.setMatrixAt(i,dummy.matrix);
});
neuronMesh.instanceMatrix.needsUpdate=true;
}

if(synapseLines){synapseLines.material.opacity=0.15+Math.sin(pulseTime*2)*0.1;}
if(starField)starField.rotation.y+=dt*0.002;
if(gridFloor)gridFloor.material.opacity=0.03+Math.sin(pulseTime)*0.01;

controls.update();
renderer.render(scene,camera);
bloomRenderer.render(bloomScene,camera);

if(Math.floor(pulseTime*60)%30===0)updateBottom();
}

var ws=null,wsReconnect=0;
function connectWS(){
try{
ws=new WebSocket(WS_URL);
ws.onopen=function(){wsReconnect=0;addEvent('SYS','WebSocket connected','system');};
ws.onmessage=function(e){
try{
var d=JSON.parse(e.data);
if(d.agents){agents=d.agents;agentMap={};agents.forEach(function(a){agentMap[a.name]=a});updateChips();updateNeurons();}
if(d.brain){brainData=d.brain;updateBrainStats(brainData);}
if(d.metrics)metricsData=d.metrics;
if(d.activeSessions)activeSessions=d.activeSessions;
if(d.sessionTree)sessionTree=d.sessionTree;
if(d.agentStats)agentStatsData=d.agentStats;
if(d.events&&d.events.length)d.events.forEach(function(ev){addEvent(ev.role||'WS',ev.content||ev.toolName||'event','ws')});
if(currentTab==='sessions')renderSessionTree();
if(currentTab==='agents')renderAgentGrid();
if(currentTab==='brain')renderBrainRegions();
if(currentTab==='system')renderSystem();
}catch(ex){}
};
ws.onerror=function(){};
ws.onclose=function(){
wsReconnect++;
var delay=Math.min(1000*Math.pow(2,wsReconnect),30000);
setTimeout(connectWS,delay);
};
}catch(e){setTimeout(connectWS,5000);}
}

function renderTreeNodes(nodes,depth){
return nodes.map(function(n){
var hasChildren=n.children&&n.children.length>0;
var toggle=hasChildren?'<span class="tree-toggle">▼</span>':'<span style="width:14px;display:inline-block"></span>';
var modelTag='<span class="model-tag">'+shortModel(n.model)+'</span>';
var countTag='<span class="count-tag">'+n.messageCount+'msg</span>';
var isActive=!n.endedAt;
var dot=isActive?'<span style="color:var(--green)">●</span>':'<span style="color:#333">●</span>';
var html='<div class="tree-node" data-sid="'+n.id+'" style="padding-left:'+(depth*20+4)+'px">'+dot+toggle+' '+(n.title||n.id.substring(0,16))+modelTag+countTag+'</div>';
if(hasChildren)html+='<div class="tree-children">'+renderTreeNodes(n.children,depth+1)+'</div>';
return html;
}).join('');
}

function shortModel(m){if(!m)return'?';var p=m.split('/');return p.length>1?p[p.length-1].substring(0,14):m.substring(0,14);}

async function showSessionInfo(sid){

var detail=await loadSessionDetail(sid);
if(!detail){

}

var html='<div style="border-bottom:1px solid var(--border);padding:10px">';

html+='</div>';

var fields=[
['Messages',detail.messageCount],['Tool Calls',detail.toolCallCount],
['Input Tokens',formatNum(detail.inputTokens)],['Output Tokens',formatNum(detail.outputTokens)],
['Total Tokens',formatNum(detail.totalTokens)],['Cost','$'+(detail.costUsd||0).toFixed(4)],

// Subagents

info.innerHTML=html;

function findInTree(nodes,sid){
for(var i=0;i<nodes.length;i++){
if(nodes[i].id===sid)return nodes[i];
if(nodes[i].children){var f=findInTree(nodes[i].children,sid);if(f)return f;}
}
return null;
}

function formatNum(n){if(!n)return '0';if(n>=1000000)return (n/1000000).toFixed(1)+'M';if(n>=1000)return (n/1000).toFixed(1)+'K';return String(n);}

html+='<div class="sys-bar"><div class="sys-label"><span>CPU</span><span style="color:var(--cyan)">'+cpuPct+'%</span></div><div class="sys-track"><div class="sys-fill" style="width:'+cpuPct+'%;background:linear-gradient(90deg,#00ff88,#00f0ff)"></div></div></div>';
html+='<div class="sys-bar"><div class="sys-label"><span>RAM</span><span style="color:var(--cyan)">'+memUsedGB+' / '+memTotalGB+' GB ('+memPct+'%)</span></div><div class="sys-track"><div class="sys-fill" style="width:'+memPct+'%;background:linear-gradient(90deg,#fbbf24,#ff003c)"></div></div></div>';
html+='<div class="sys-bar"><div class="sys-label"><span>DISK</span><span style="color:var(--cyan)">'+diskUsedGB+' / '+diskTotalGB+' GB ('+diskPct+'%)</span></div><div class="sys-track"><div class="sys-fill" style="width:'+diskPct+'%;background:linear-gradient(90deg,#ff003c,#a855f7)"></div></div></div>';

html+='<div style="margin-top:12px;font-size:9px;color:#555;letter-spacing:2px">NETWORK I/O</div>';
html+='<div style="display:flex;gap:20px;margin:8px 0;font-size:10px"><div><span style="color:#666">TX:</span> <span style="color:var(--cyan)">'+formatBytes(m.netBytesSent||0)+'</span></div><div><span style="color:#666">RX:</span> <span style="color:var(--cyan)">'+formatBytes(m.netBytesRecv||0)+'</span></div></div>';

// Agent processes
if(m.agentProcesses&&Object.keys(m.agentProcesses).length){
html+='<div style="margin-top:12px;font-size:9px;color:#555;letter-spacing:2px">AGENT PROCESSES</div>';
Object.entries(m.agentProcesses).forEach(function(entry){
var name=entry[0],procs=entry[1];
procs.forEach(function(p){
html+='<div style="padding:4px 8px;margin:3px 0;background:var(--panel);border-radius:4px;font-size:9px;border-left:2px solid var(--cyan)"><b style="color:var(--cyan)">'+name+'</b> PID:'+p.pid+' CPU:'+p.cpu+'% MEM:'+p.mem+'%<div style="color:#333;font-size:8px;margin-top:2px">'+(p.cmd||'')+'</div></div>';
});
});
}

el.innerHTML=html;
}

function formatBytes(b){if(!b)return '0B';var u=['B','KB','MB','GB'];var i=0;while(b>=1024&&i<u.length-1){b/=1024;i++;}return b.toFixed(1)+u[i];}

// ═══ BOTTOM BAR ═══
function updateBottom(){
var bar=document.getElementById('bottom-bar');
var active=agents.filter(function(a){return a.running}).length;
var installed=agents.filter(function(a){return a.installed}).length;
var ts=new Date().toLocaleTimeString();
var drawCalls=renderer?renderer.info.render.calls:0;
bar.innerHTML='<div class="bstat"><span class="lbl">AGENTS</span><span class="val">'+agents.length+'</span></div>'+
'<div class="bstat"><span class="lbl">ACTIVE</span><span class="val" style="color:var(--green)">'+active+'</span></div>'+
'<div class="bstat"><span class="lbl">INSTALLED</span><span class="val" style="color:var(--yellow)">'+installed+'</span></div>'+
'<div class="bstat"><span class="lbl">SESSIONS</span><span class="val">'+activeSessions.length+'</span></div>'+
'<div class="bstat"><span class="lbl">MEM</span><span class="val">'+(performance&&performance.memory?Math.round(performance.memory.usedJSHeapSize/1048576)+'MB':'—')+'</span></div>'+
'<div class="bstat"><span class="lbl">TIME</span><span class="val">'+ts+'</span></div>'+
'<div class="bstat"><span class="lbl">DRAW</span><span class="val">'+drawCalls+'</span></div>';
}

// ═══ BOOT ═══
init3D();
loadAll();
connectWS();
setInterval(function(){if(!ws||ws.readyState!==1)loadAll();},POLL_MS);
addEvent('SYS','AkpanBrain Neural Interface online','system');
</script>
