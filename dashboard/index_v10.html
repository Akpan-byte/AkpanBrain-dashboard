<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>AkpanBrain — Neural Dashboard v10</title>
<style>
:root{--bg:#060610;--card:rgba(8,10,22,0.92);--border:rgba(255,0,60,0.12);--red:#ff003c;--cyan:#00f0ff;--green:#00ff88;--yellow:#ffd000;--purple:#a855f7;--glow:rgba(255,0,60,0.4);--font:'JetBrains Mono',monospace;--ui-font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:#e0e0e0;font-family:var(--ui-font);overflow:hidden;height:100vh;width:100vw}
#gl{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
#bloom-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;filter:blur(8px);mix-blend-mode:screen;opacity:0.5}
#scanlines{position:fixed;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px)}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}
#ui>*{pointer-events:auto}
#top-bar{position:absolute;top:0;left:0;right:0;height:44px;background:linear-gradient(180deg,rgba(6,6,16,0.97),rgba(6,6,16,0.7));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:6px;overflow-x:auto;scrollbar-width:none}
#top-bar::-webkit-scrollbar{display:none}
#brand{font-family:var(--font);font-size:12px;color:var(--red);letter-spacing:3px;white-space:nowrap;text-shadow:0 0 10px var(--glow);margin-right:8px;cursor:pointer}
.chip{display:flex;align-items:center;gap:4px;padding:3px 8px;border:1px solid var(--border);border-radius:10px;background:var(--card);font-size:9px;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:var(--ui-font)}
.chip:hover{border-color:var(--red);box-shadow:0 0 10px var(--glow)}
.chip.active-chip{border-color:var(--cyan);box-shadow:0 0 8px rgba(0,240,255,0.3)}
.chip .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.chip .dot.on{box-shadow:0 0 6px currentColor;animation:pulse 2s infinite}
.chip .dot.off{opacity:0.2}
.chip .icon{font-size:11px}
.chip .name{color:#ccc;font-family:var(--font);font-size:8px;text-transform:uppercase}
.chip .type{color:#444;font-size:7px;font-family:var(--font)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.7)}}

/* ═══ TABS ═══ */
#tab-bar{position:absolute;top:44px;left:0;right:0;height:32px;background:linear-gradient(180deg,rgba(6,6,16,0.95),rgba(6,6,16,0.6));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:4px}
.tab{padding:4px 14px;font-family:var(--font);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#555;cursor:pointer;border-radius:4px;transition:all .2s}
.tab:hover{color:#aaa}
.tab.on{color:var(--cyan);background:rgba(0,240,255,0.06);border:1px solid rgba(0,240,255,0.15)}

/* ═══ PANELS ═══ */
.panel{position:absolute;top:76px;left:0;right:0;bottom:28px;overflow-y:auto;overflow-x:hidden;pointer-events:auto;display:none;padding:8px;scrollbar-width:thin;scrollbar-color:#1a1a2e transparent}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:#1a1a2e;border-radius:2px}
.panel.visible{display:block}
#panel-3d{padding:0;overflow:hidden}

/* ═══ SIDE PANEL ═══ */
#side-panel{position:absolute;top:76px;right:8px;width:240px;max-height:calc(100vh - 108px);background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;transition:width .3s;z-index:20}
#side-panel.collapsed{width:28px}
#side-toggle{display:flex;align-items:center;justify-content:center;height:24px;cursor:pointer;color:var(--red);font-size:12px;border-bottom:1px solid var(--border)}
#side-content{padding:6px;overflow-y:auto;flex:1;font-family:var(--font);font-size:8px}
#side-content h3{color:var(--cyan);font-size:9px;margin:6px 0 3px;text-transform:uppercase;letter-spacing:1px}
.stat-row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.02)}
.stat-row .k{color:#555}.stat-row .v{color:#999}
#events{margin-top:6px;max-height:180px;overflow-y:auto}
.evt{padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.02);font-size:7px;line-height:1.3}
.evt .t{color:#333}.evt .m{color:#777}

/* ═══ AGENT GRID ═══ */
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.agent-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;transition:all .3s;position:relative;overflow:hidden}
.agent-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0.6}
.agent-card:hover{border-color:rgba(255,0,60,0.3);transform:translateY(-1px)}
.agent-card.running{border-color:rgba(0,240,255,0.15)}
.agent-card.running::before{background:linear-gradient(90deg,var(--cyan),transparent)}
.agent-card.installed::before{background:linear-gradient(90deg,var(--yellow),transparent)}
.agent-card.dormant{opacity:0.4}
.agent-card.dormant::before{background:linear-gradient(90deg,#333,transparent)}
.agent-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.agent-icon{font-size:20px}
.agent-name{font-family:var(--font);font-size:11px;font-weight:700;letter-spacing:1px}
.agent-type{font-family:var(--font);font-size:7px;color:#555;text-transform:uppercase;letter-spacing:1px}
.agent-status{display:inline-block;padding:1px 8px;border-radius:8px;font-size:7px;letter-spacing:1px;font-weight:700;font-family:var(--font)}
.agent-status.active{background:rgba(0,255,136,0.12);color:var(--green);border:1px solid rgba(0,255,136,0.2)}
.agent-status.installed{background:rgba(255,208,0,0.1);color:var(--yellow);border:1px solid rgba(255,208,0,0.15)}
.agent-status.dormant{background:rgba(255,255,255,0.04);color:#444;border:1px solid rgba(255,255,255,0.05)}
.agent-region{font-size:8px;color:#555;margin-top:4px;font-family:var(--font)}
.agent-path{font-size:7px;color:#333;margin-top:2px;font-family:var(--font);word-break:break-all}

/* ═══ BACKTEST ═══ */
.version-nav{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.ver-btn{padding:6px 16px;font-family:var(--font);font-size:10px;letter-spacing:1px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:#666;cursor:pointer;transition:all .2s}
.ver-btn:hover{color:#ccc;border-color:rgba(255,0,60,0.3)}
.ver-btn.on{color:var(--cyan);border-color:var(--cyan);background:rgba(0,240,255,0.06);box-shadow:0 0 12px rgba(0,240,255,0.1)}
.bt-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.bt-stat{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:12px}
.bt-stat .label{font-size:7px;color:#555;text-transform:uppercase;letter-spacing:1px;font-family:var(--font)}
.bt-stat .value{font-size:20px;font-weight:900;margin-top:2px}
.bt-stat .value.pos{color:var(--green)}
.bt-stat .value.neg{color:var(--red)}
.bt-stat .value.ice{color:var(--cyan)}
#equity-canvas{width:100%;height:200px;background:#060610;border-radius:6px;border:1px solid var(--border)}
.market-table{width:100%;border-collapse:collapse;font-size:9px;font-family:var(--font)}
.market-table th{color:#555;text-align:left;padding:6px 4px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:1px;font-size:7px}
.market-table td{padding:5px 4px;border-bottom:1px solid rgba(255,255,255,0.02)}
.market-table .won{color:var(--green)}
.market-table .lost{color:var(--red)}

/* ═══ BRAIN PANEL ═══ */
.region-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.region-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;position:relative;overflow:hidden}
.region-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.region-name{font-family:var(--font);font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:2px}
.region-backend{font-family:var(--font);font-size:8px;color:#555;margin-bottom:8px}
.region-desc{font-size:10px;color:#888;line-height:1.4;margin-bottom:8px}
.region-functions{display:flex;flex-wrap:wrap;gap:4px}
.region-fn{padding:2px 6px;font-size:7px;font-family:var(--font);border-radius:3px;background:rgba(255,255,255,0.03);color:#666;border:1px solid rgba(255,255,255,0.03)}

/* ═══ BOTTOM BAR ═══ */
#bottom-bar{position:absolute;bottom:0;left:0;right:0;height:28px;background:linear-gradient(0deg,rgba(6,6,16,0.97),rgba(6,6,16,0.7));border-top:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:14px;font-family:var(--font);font-size:8px;color:#444}
.bstat{display:flex;align-items:center;gap:3px}
.bstat .lbl{color:#333}.bstat .val{color:var(--cyan)}
#focus-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--cyan);font-family:var(--font);font-size:16px;text-shadow:0 0 20px var(--cyan);opacity:0;transition:opacity .5s;pointer-events:none;text-align:center;letter-spacing:4px}
#focus-label.show{opacity:1}
@media(max-width:768px){#side-panel{display:none}#top-bar{height:38px}#tab-bar{height:28px}#bottom-bar{height:24px;font-size:7px}.chip{padding:2px 5px;font-size:8px}.chip .name{display:none}#brand{font-size:10px;letter-spacing:2px}.agent-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<canvas id="bloom-canvas"></canvas>
<div id="scanlines"></div>
<div id="ui">
<div id="top-bar"><span id="brand">AKPANBRAIN</span></div>
<div id="tab-bar">
<div class="tab on" data-tab="3d">⬡ 3D</div>
<div class="tab" data-tab="agents">◉ AGENTS</div>
<div class="tab" data-tab="backtest">❄ COLDMATH</div>
<div class="tab" data-tab="brain">⟁ BRAIN</div>
</div>
<div id="panel-3d" class="panel visible"></div>
<div id="panel-agents" class="panel"><div class="agent-grid" id="agent-grid"></div></div>
<div id="panel-backtest" class="panel"><div id="backtest-content"></div></div>
<div id="panel-brain" class="panel"><div class="region-grid" id="region-grid"></div></div>
<div id="side-panel"><div id="side-toggle">◀</div><div id="side-content"><h3>Brain Regions</h3><div id="brain-stats"></div><h3>Events</h3><div id="events"></div></div></div>
<div id="bottom-bar"></div>
<div id="focus-label"></div>
</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';
import{OrbitControls}from'three/addons/controls/OrbitControls.js';

// ═══ EMBEDDED DATA ═══
var EMBEDDED_DATA=$EMBEDded$;
var API_BASE=location.hostname==='localhost'?'http://localhost:8199':'https://brain-api.akpan.workers.dev';
var WS_URL=location.hostname==='localhost'?'ws://localhost:8199/ws':null;
var scene,camera,renderer,controls,bloomRenderer,bloomScene;
var neuronMesh,synapseLines,starField,gridFloor;
var agents=[],agentMap={},neuronPositions=[],targetCamPos=null,camLerp=0;
var clock=new THREE.Clock();
var pulseTime=0;
var eventLog=[];
var currentTab='3d';
var selectedVersion=0;

// ═══ BRAIN REGIONS ═══
var BRAIN_REGIONS={
semantic:{name:"Semantic Cortex",backend:"FAISS int8",color:"#00f5ff",desc:"Long-term semantic memory store. Vector embeddings for concept retrieval. FAISS int8 quantization = 4x RAM savings.",fns:["Vector embedding","Similarity search","Concept retrieval","TF-IDF fallback"]},
graph:{name:"Knowledge Graph",backend:"NetworkX + GraphML",color:"#00ff9d",desc:"Relational knowledge store. Maps connections between concepts, agents, and processes. Multi-hop reasoning.",fns:["Entity relationships","Graph traversal","Multi-hop reasoning","Agent dependency mapping"]},
episodic:{name:"Episodic Memory",backend:"SQLite",color:"#f59e0b",desc:"Time-stamped episode storage. Records what happened, when, which agent. Pattern detection across time.",fns:["Event logging","Chronological recall","Agent activity history","Pattern detection"]},
working:{name:"Working Memory",backend:"Redis 6379",color:"#ff2d55",desc:"Short-term high-speed scratchpad. Active task context, agent states, real-time coordination. TTL 1hr.",fns:["Active task context","Agent state tracking","Real-time coordination","Session management"]},
procedural:{name:"Procedural Cortex",backend:"Skills (SKILL.md)",color:"#8b5cf6",desc:"Learned procedures and workflows. Reusable skills, code patterns, operational knowledge. Auto-load per task.",fns:["Skill storage","Workflow patterns","Code templates","Auto-skill loading"]},
sensory:{name:"Sensory Buffer",backend:"File Watcher",color:"#ff6b35",desc:"Short-term input buffer. Watches filesystem for new files, changes. Auto-ingests into brain regions.",fns:["File change detection","New file ingestion","Event buffering","Trigger cascading updates"]}
};

// ═══ TAB NAVIGATION ═══
document.querySelectorAll('.tab').forEach(function(t){
t.onclick=function(){
document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on')});
t.classList.add('on');
currentTab=t.dataset.tab;
document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('visible')});
document.getElementById('panel-'+currentTab).classList.add('visible');
if(currentTab==='agents')renderAgentGrid();
if(currentTab==='backtest')renderBacktest();
if(currentTab==='brain')renderBrainRegions();
};
});

// ═══ 3D INIT ═══
function init(){
scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x060610,0.035);
camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,200);
camera.position.set(0,8,18);
renderer=new THREE.WebGLRenderer({canvas:document.getElementById('gl'),antialias:false,alpha:false});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
bloomScene=new THREE.Scene();
bloomScene.fog=scene.fog;
bloomRenderer=new THREE.WebGLRenderer({canvas:document.getElementById('bloom-canvas'),antialias:false,alpha:true});
bloomRenderer.setSize(Math.floor(innerWidth/4),Math.floor(innerHeight/4));
bloomRenderer.toneMapping=renderer.toneMapping;
bloomRenderer.toneMappingExposure=1.5;
controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=0.05;
controls.maxDistance=50;
controls.minDistance=3;
controls.target.set(0,0,0);
buildStarfield();
buildGrid();
loadAgents();
animate();
window.addEventListener('resize',onResize);
setInterval(loadAgents,30000);
setInterval(loadBrain,15000);
loadBrain();
if(WS_URL){try{
var ws=new WebSocket(WS_URL);
ws.onmessage=function(e){addEvent('WS',e.data,'ws')};
ws.onopen=function(){addEvent('SYS','WebSocket connected','system')};
ws.onerror=function(){};
}catch(e){}}
}

function onResize(){
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
bloomRenderer.setSize(Math.floor(innerWidth/4),Math.floor(innerHeight/4));
}

// ═══ STARFIELD ═══
function buildStarfield(){
var geo=new THREE.BufferGeometry();
var n=2500,pos=new Float32Array(n*3),cols=new Float32Array(n*3);
for(var i=0;i<n;i++){
var r=40+Math.random()*80,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
pos[i*3]=r*Math.sin(ph)*Math.cos(th);
pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);
pos[i*3+2]=r*Math.cos(ph);
var b=0.3+Math.random()*0.7;
cols[i*3]=b*0.8;cols[i*3+1]=b*0.9;cols[i*3+2]=b;
}
geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
geo.setAttribute('color',new THREE.BufferAttribute(cols,3));
var mat=new THREE.PointsMaterial({size:0.15,vertexColors:true,transparent:true,opacity:0.7,sizeAttenuation:true});
starField=new THREE.Points(geo,mat);
scene.add(starField);
bloomScene.add(starField.clone());
}

// ═══ HOLOGRAPHIC GRID ═══
function buildGrid(){
var geo=new THREE.PlaneGeometry(60,60,30,30);
var mat=new THREE.MeshBasicMaterial({color:0xff003c,wireframe:true,transparent:true,opacity:0.04});
gridFloor=new THREE.Mesh(geo,mat);
gridFloor.rotation.x=-Math.PI/2;
gridFloor.position.y=-5;
scene.add(gridFloor);
var g2=gridFloor.clone();
g2.material=mat.clone();g2.material.opacity=0.02;g2.material.color.set(0x00f0ff);
bloomScene.add(g2);
}

// ═══ AGENT LOADING (auto-detect from API + embedded fallback) ═══
async function loadAgents(){
try{
var r=await fetch(API_BASE+'/api/agents');
var data=await r.json();
var list=Object.values(data);
var prevCount=agents.length;
agents=list.map(function(a){
return{
name:a.name||a.desc||'unknown',
type:a.type||'unknown',
color:a.color||'#888',
icon:a.icon||(a.type==='coding'?'💻':'🤖'),
running:a.status==='active',
installed:a.status!=='dormant',
path:a.path||'',
region:a.region||'semantic'
};
});
agentMap={};
agents.forEach(function(a){agentMap[a.name]=a});
updateChips();
updateNeurons();
if(agents.length!==prevCount)addEvent('SYS',agents.length+' agents detected','system');
}catch(e){
if(EMBEDDED_DATA&&EMBEDDED_DATA.agents){
agents=Object.values(EMBEDDED_DATA.agents);
agentMap={};
agents.forEach(function(a){agentMap[a.name]=a});
updateChips();updateNeurons();
}
}
}

async function loadBrain(){
try{
var r=await fetch(API_BASE+'/api/brain');
var data=await r.json();
updateBrainStats(data);
}catch(e){
if(EMBEDDED_DATA&&EMBEDDED_DATA.brain)updateBrainStats(EMBEDDED_DATA.brain);
}
}

// ═══ AGENT CHIPS ═══
function updateChips(){
var bar=document.getElementById('top-bar');
var brand=document.getElementById('brand');
bar.querySelectorAll('.chip').forEach(function(c){c.remove()});
agents.forEach(function(a){
var chip=document.createElement('div');
chip.className='chip'+(a.running?' active-chip':'');
chip.dataset.agent=a.name;
var dotClass=a.running?'on':'off';
chip.innerHTML='<span class="icon">'+(a.icon||'🤖')+'</span><span class="dot '+dotClass+'" style="background:'+a.color+';color:'+a.color+'"></span><span class="name">'+a.name+'</span><span class="type">'+a.type+'</span>';
chip.onclick=function(){focusAgent(a.name)};
bar.appendChild(chip);
});
}

// ═══ 3D NEURONS ═══
function updateNeurons(){
var count=agents.length;
if(count===0)return;
neuronPositions=[];
agents.forEach(function(a,i){
var phi=Math.acos(-1+(2*i)/count);
var theta=Math.sqrt(count*Math.PI)*phi;
var r=4+Math.random()*3;
neuronPositions.push(new THREE.Vector3(r*Math.cos(theta)*Math.sin(phi),r*Math.sin(theta)*Math.sin(phi)-1,r*Math.cos(phi)));
});
if(neuronMesh){scene.remove(neuronMesh);bloomScene.remove(neuronMesh.clone())}
var icoGeo=new THREE.IcosahedronGeometry(0.3,1);
var icoMat=new THREE.MeshPhongMaterial({transparent:true,opacity:0.85,shininess:120});
neuronMesh=new THREE.InstancedMesh(icoGeo,icoMat,count);
var dummy=new THREE.Object3D();
var color=new THREE.Color();
agents.forEach(function(a,i){
dummy.position.copy(neuronPositions[i]);
var s=a.running?1.0:0.5;
dummy.scale.set(s,s,s);
dummy.updateMatrix();
neuronMesh.setMatrixAt(i,dummy.matrix);
color.set(a.color||'#888888');
neuronMesh.setColorAt(i,color);
});
neuronMesh.instanceMatrix.needsUpdate=true;
neuronMesh.instanceColor.needsUpdate=true;
scene.add(neuronMesh);
var bloomMesh=neuronMesh.clone();
bloomMesh.material=icoMat.clone();
bloomMesh.material.opacity=1.0;
bloomScene.add(bloomMesh);
updateSynapses();
}

// ═══ SYNAPSES ═══
function updateSynapses(){
if(synapseLines){scene.remove(synapseLines)}
var positions=[],colors=[];
var c=new THREE.Color();
agents.forEach(function(a,i){
agents.forEach(function(b,j){
if(i>=j)return;
var connected=false;
if(a.type==='reasoning'||b.type==='reasoning')connected=true;
if(a.type==='routing'||b.type==='routing')connected=true;
if(a.running&&b.running)connected=true;
if(connected&&neuronPositions[i]&&neuronPositions[j]){
positions.push(neuronPositions[i].x,neuronPositions[i].y,neuronPositions[i].z);
positions.push(neuronPositions[j].x,neuronPositions[j].y,neuronPositions[j].z);
var isPulse=a.running&&b.running;
c.set(isPulse?'#00f0ff':'#ff003c');
colors.push(c.r,c.g,c.b);
c.set(isPulse?'#00f0ff':'#ff003c');
colors.push(c.r,c.g,c.b);
}
});
});
if(positions.length===0)return;
var geo=new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
var mat=new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.25});
synapseLines=new THREE.LineSegments(geo,mat);
scene.add(synapseLines);
}

// ═══ FOCUS CAMERA ═══
function focusAgent(name){
var idx=agents.findIndex(function(a){return a.name===name});
if(idx<0||!neuronPositions[idx])return;
var pos=neuronPositions[idx];
targetCamPos=new THREE.Vector3(pos.x+4,pos.y+3,pos.z+4);
camLerp=0;
var label=document.getElementById('focus-label');
label.textContent=name.toUpperCase()+' — '+agents[idx].type;
label.classList.add('show');
setTimeout(function(){label.classList.remove('show')},2000);
}

// ═══ BRAIN STATS UI ═══
function updateBrainStats(data){
var el=document.getElementById('brain-stats');
if(!data||typeof data!=='object'){el.innerHTML='<div style="color:#444">No data</div>';return}
var html='';
if(data.faiss)html+='<div class="stat-row"><span class="k">Semantic</span><span class="v">'+(data.faiss.count||0)+' vectors</span></div>';
if(data.graph)html+='<div class="stat-row"><span class="k">Graph</span><span class="v">'+(data.graph.nodes||0)+' nodes / '+(data.graph.edges||0)+' edges</span></div>';
if(data.episodic)html+='<div class="stat-row"><span class="k">Episodic</span><span class="v">'+(data.episodic.total||0)+' episodes</span></div>';
if(data.redis)html+='<div class="stat-row"><span class="k">Working</span><span class="v">'+(data.redis.keys||0)+' keys</span></div>';
if(data.skills)html+='<div class="stat-row"><span class="k">Procedural</span><span class="v">'+(data.skills.count||0)+' skills</span></div>';
el.innerHTML=html||'<div style="color:#444">Empty</div>';
}

function addEvent(src,msg,type){
eventLog.unshift({t:new Date().toLocaleTimeString(),s:src,m:msg.substring(0,80),tp:type});
if(eventLog.length>50)eventLog.pop();
var el=document.getElementById('events');
el.innerHTML=eventLog.map(function(e){return'<div class="evt"><span class="t">'+e.t+'</span> <span class="m">['+e.s+'] '+e.m+'</span></div>'}).join('');
}

// ═══ AGENT GRID PANEL ═══
function renderAgentGrid(){
var grid=document.getElementById('agent-grid');
var sorted=agents.slice().sort(function(a,b){
var pa=a.running?0:a.installed?1:2;
var pb=b.running?0:b.installed?1:2;
return pa-pb;
});
grid.innerHTML=sorted.map(function(a){
var statusCls=a.running?'active':a.installed?'installed':'dormant';
var cardCls=a.running?'running':a.installed?'installed':'dormant';
var statusText=a.running?'ACTIVE':a.installed?'INSTALLED':'DORMANT';
var regionName=a.region||'unknown';
var region=BRAIN_REGIONS[regionName];
var regionLabel=region?region.name:regionName;
return'<div class="agent-card '+cardCls+'" style="--acolor:'+a.color+'">'+
'<div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,'+a.color+',transparent);opacity:0.6"></div>'+
'<div class="agent-header">'+
'<span class="agent-icon">'+(a.icon||'🤖')+'</span>'+
'<div><div class="agent-name" style="color:'+a.color+'">'+a.name.toUpperCase()+'</div>'+
'<div class="agent-type">'+a.type+'</div></div>'+
'<span class="agent-status '+statusCls+'" style="margin-left:auto">'+statusText+'</span>'+
'</div>'+
'<div class="agent-region">⟁ '+regionLabel+'</div>'+
(a.path?'<div class="agent-path">'+a.path+'</div>':'')+
'</div>';
}).join('');
}

// ═══ BACKTEST PANEL ═══
function renderBacktest(){
var el=document.getElementById('backtest-content');
var runs=EMBEDDED_DATA.backtest||[];
if(!runs.length){el.innerHTML='<div style="text-align:center;color:#444;padding:40px">No backtest data</div>';return}

var verBtns=runs.map(function(r,i){
return'<div class="ver-btn'+(i===selectedVersion?' on':'')+'" data-idx="'+i+'">V'+r.version+'</div>';
}).join('');

var run=runs[selectedVersion]||runs[0];
var pnl=run.total_pnl||0;
var roi=run.return_pct||0;

var statsHtml=[
{label:'Starting Bankroll',value:'$'+(run.starting_bankroll||0).toFixed(2),cls:'ice'},
{label:'Final Bankroll',value:'$'+(run.final_bankroll||0).toFixed(2),cls:'ice'},
{label:'Total P&L',value:(pnl>=0?'+':'')+('$'+pnl.toFixed(2)),cls:pnl>=0?'pos':'neg'},
{label:'ROI',value:roi.toFixed(1)+'%',cls:roi>=0?'pos':'neg'},
{label:'Win Rate',value:(run.win_rate||0).toFixed(1)+'%',cls:'ice'},
{label:'Max Drawdown',value:(run.max_drawdown||0).toFixed(1)+'%',cls:'neg'},
{label:'Qualifying',value:(run.qualifying_markets||0)+'/'+(run.total_markets||0),cls:'ice'},
{label:'W/L',value:(run.winning_trades||0)+'W / '+(run.losing_trades||0)+'L',cls:'ice'},
].map(function(s){
return'<div class="bt-stat"><div class="label">'+s.label+'</div><div class="value '+s.cls+'">'+s.value+'</div></div>';
}).join('');

// Equity curve
var curve=run.equity_curve||[run.starting_bankroll,run.final_bankroll];
var canvasId='bt-equity';

el.innerHTML=
'<div style="margin-bottom:8px;font-family:var(--font);font-size:10px;color:#555;letter-spacing:2px">BACKTEST VERSIONS</div>'+
'<div class="version-nav">'+verBtns+'</div>'+
'<div class="bt-stats">'+statsHtml+'</div>'+
'<div style="margin:12px 0 6px;font-family:var(--font);font-size:9px;color:#555;letter-spacing:1px">EQUITY CURVE — V'+run.version+'</div>'+
'<canvas id="'+canvasId+'" style="width:100%;height:200px;background:#060610;border-radius:6px;border:1px solid var(--border)"></div>'+
(run.notes?'<div style="margin-top:8px;font-size:9px;color:#555;font-family:var(--font)">'+run.notes+'</div>':'');

// Wire version buttons
el.querySelectorAll('.ver-btn').forEach(function(btn){
btn.onclick=function(){
selectedVersion=parseInt(btn.dataset.idx);
renderBacktest();
};
});

// Draw equity curve
setTimeout(function(){drawEquityCurve(canvasId,curve)},50);
}

function drawEquityCurve(canvasId,values){
var canvas=document.getElementById(canvasId);
if(!canvas||!values.length)return;
var rect=canvas.getBoundingClientRect();
canvas.width=rect.width*2;
canvas.height=rect.height*2;
var ctx=canvas.getContext('2d');
ctx.scale(2,2);
var w=rect.width,h=rect.height;
var pad={top:16,right:16,bottom:24,left:50};
var plotW=w-pad.left-pad.right;
var plotH=h-pad.top-pad.bottom;
var minV=Math.min.apply(null,values);
var maxV=Math.max.apply(null,values);
var rangeV=maxV-minV||1;

ctx.fillStyle='#060610';
ctx.fillRect(0,0,w,h);

// Grid
ctx.strokeStyle='#1a1a2e';
ctx.lineWidth=0.5;
for(var i=0;i<=4;i++){
var y=pad.top+(plotH*i/4);
ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+plotW,y);ctx.stroke();
ctx.fillStyle='#333';
ctx.font='8px monospace';
ctx.textAlign='right';
ctx.fillText('$'+(maxV-(rangeV*i/4)).toFixed(0),pad.left-6,y+3);
}

// Equity line
ctx.beginPath();
ctx.strokeStyle='#00f0ff';
ctx.lineWidth=2;
ctx.shadowColor='#00f0ff';
ctx.shadowBlur=10;
values.forEach(function(v,i){
var x=pad.left+(i/(values.length-1||1))*plotW;
var y=pad.top+plotH-((v-minV)/rangeV)*plotH;
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
});
ctx.stroke();

// Fill area
ctx.shadowBlur=0;
ctx.lineTo(pad.left+plotW,pad.top+plotH);
ctx.lineTo(pad.left,pad.top+plotH);
ctx.closePath();
var grad=ctx.createLinearGradient(0,pad.top,0,pad.top+plotH);
grad.addColorStop(0,'rgba(0,240,255,0.12)');
grad.addColorStop(1,'rgba(0,240,255,0.01)');
ctx.fillStyle=grad;
ctx.fill();

// Data points
values.forEach(function(v,i){
var x=pad.left+(i/(values.length-1||1))*plotW;
var y=pad.top+plotH-((v-minV)/rangeV)*plotH;
ctx.beginPath();
ctx.arc(x,y,3,0,Math.PI*2);
ctx.fillStyle='#00f0ff';
ctx.shadowColor='#00f0ff';
ctx.shadowBlur=6;
ctx.fill();
ctx.shadowBlur=0;
});
}

// ═══ BRAIN REGIONS PANEL ═══
function renderBrainRegions(){
var grid=document.getElementById('region-grid');
var regions=Object.entries(BRAIN_REGIONS);
grid.innerHTML=regions.map(function(entry){
var key=entry[0],r=entry[1];
return'<div class="region-card">'+
'<div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,'+r.color+',transparent)"></div>'+
'<div class="region-name" style="color:'+r.color+'">'+r.name+'</div>'+
'<div class="region-backend">'+r.backend+'</div>'+
'<div class="region-desc">'+r.desc+'</div>'+
'<div class="region-functions">'+r.fns.map(function(f){return'<div class="region-fn">'+f+'</div>'}).join('')+'</div>'+

// ═══ BOTTOM BAR ═══
function updateBottom(){
var bar=document.getElementById('bottom-bar');
var active=agents.filter(function(a){return a.running}).length;
var installed=agents.filter(function(a){return a.installed}).length;
var ts=new Date().toLocaleTimeString();
bar.innerHTML='<div class="bstat"><span class="lbl">AGENTS</span><span class="val">'+agents.length+'</span></div>'+
'<div class="bstat"><span class="lbl">ACTIVE</span><span class="val" style="color:var(--green)">'+active+'</span></div>'+
'<div class="bstat"><span class="lbl">INSTALLED</span><span class="val" style="color:var(--yellow)">'+installed+'</span></div>'+
'<div class="bstat"><span class="lbl">MEM</span><span class="val">'+(performance.memory?Math.round(performance.memory.usedJSHeapSize/1048576)+'MB':'—')+'</span></div>'+
'<div class="bstat"><span class="lbl">TIME</span><span class="val">'+ts+'</span></div>'+
'<div class="bstat"><span class="lbl">DRAW</span><span class="val">'+renderer.info.render.calls+'</span></div>';
}

// ═══ ANIMATE ═══
function animate(){
requestAnimationFrame(animate);
var dt=clock.getDelta();
pulseTime+=dt;

if(targetCamPos){
camLerp+=dt*0.8;
camera.position.lerp(targetCamPos,Math.min(camLerp,1)*0.05);
if(camLerp>3)targetCamPos=null;
}

if(neuronMesh){
var dummy=new THREE.Object3D();
agents.forEach(function(a,i){
if(!neuronPositions[i])return;
dummy.position.copy(neuronPositions[i]);
var base=a.running?1.0:0.5;
var s=base;
if(a.running){s=base+Math.sin(pulseTime*3+i)*0.1;}
dummy.position.y+=Math.sin(pulseTime*0.5+i*0.7)*0.08;
dummy.scale.set(s,s,s);
dummy.rotation.y=pulseTime*0.3+i;
dummy.updateMatrix();
neuronMesh.setMatrixAt(i,dummy.matrix);
});
neuronMesh.instanceMatrix.needsUpdate=true;
}

if(synapseLines){synapseLines.material.opacity=0.15+Math.sin(pulseTime*2)*0.1;}
if(starField)starField.rotation.y+=dt*0.003;
if(gridFloor)gridFloor.material.opacity=0.03+Math.sin(pulseTime)*0.01;

controls.update();
renderer.render(scene,camera);
bloomRenderer.render(bloomScene,camera);

if(Math.floor(pulseTime*60)%30===0)updateBottom();
}

init();
</script>
