#lp{grid-row:2;padding:6px;overflow-y:auto;pointer-events:auto;background:var(--bk2);border-right:1px solid var(--bd)}
#rp{grid-row:2;padding:6px;overflow-y:auto;pointer-events:auto;background:var(--bk2);border-left:1px solid var(--bd)}

.st{font-size:8px;letter-spacing:3px;color:var(--r);text-transform:uppercase;margin-bottom:4px;font-weight:700;border-bottom:1px solid var(--bd);padding-bottom:3px}
.ac{display:flex;align-items:center;gap:5px;padding:4px 6px;margin-bottom:2px;background:var(--bk3);border-radius:3px;border:1px solid transparent;cursor:pointer;transition:.15s}
.ac:hover{border-color:var(--r)}

.ll{font-size:7px;padding:1px 0;display:flex;gap:5px;opacity:.75;line-height:1.4}
.lt{color:var(--s3);flex-shrink:0;min-width:50px}

#ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;display:none;pointer-events:auto}
#ov.open{display:block}
#dp{position:fixed;z-index:100;pointer-events:auto;display:none;overflow-y:auto;background:rgba(10,10,10,.98);border:1px solid var(--s3);box-shadow:0 0 40px rgba(255,0,0,.08)}
@media(min-width:901px){#dp{top:50%;left:50%;transform:translate(-50%,-50%);width:460px;max-height:80vh;border-radius:6px}}
@media(max-width:900px){#dp{bottom:0;left:0;width:100%;max-height:70vh;border-top:1px solid var(--s3);border-radius:14px 14px 0 0}}
#dp.open{display:block;animation:pi .2s ease-out}
@keyframes pi{0%{opacity:0;transform:scale(.93)}100%{opacity:1;transform:scale(1)}}
#dh{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--bd)}
#di{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;flex-shrink:0;background:var(--r);color:#fff;box-shadow:0 0 15px var(--rg)}
#dt{font-size:13px;font-weight:900;letter-spacing:2px;flex:1;color:var(--s)}
#dc{font-size:20px;cursor:pointer;color:var(--s2);padding:4px 8px;transition:.2s}
#dc:hover{color:#fff}
#db{padding:12px 14px}
.ds{margin-bottom:12px}
.dl{font-size:7px;letter-spacing:3px;color:var(--r);text-transform:uppercase;margin-bottom:4px;font-weight:700}
.dt{font-size:10px;line-height:1.6;color:var(--s)}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.dgi{background:var(--bk3);padding:6px 8px;border-radius:3px;border:1px solid var(--bd)}
.dgl{font-size:6px;letter-spacing:1px;color:var(--s2);text-transform:uppercase}
.dgv{font-size:13px;font-weight:900;color:var(--s)}
.df{list-style:none;padding:0;max-height:200px;overflow-y:auto}
.df li{font-size:8px;padding:2px 5px;margin:1px 0;background:var(--bk3);border-radius:2px;border:1px solid var(--bd);color:var(--s);word-break:break-all;display:flex;justify-content:space-between}
.fn{color:var(--s);font-weight:700}
.fs{color:var(--s3);font-size:6px}
#ld{position:fixed;inset:0;background:var(--bk);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .4s}
#ld.hide{opacity:0;pointer-events:none}
.ltx{font-size:11px;letter-spacing:4px;color:var(--r);animation:pu 1s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.lbr{width:140px;height:2px;background:rgba(255,0,0,.15);margin-top:8px;border-radius:1px;overflow:hidden}
.lpr{height:100%;background:var(--r);transition:width .2s}
#api-status{position:fixed;top:42px;right:8px;z-index:50;font-size:7px;letter-spacing:1px;padding:2px 6px;border-radius:2px;pointer-events:none;transition:.3s}
#api-status.local{color:var(--r);border:1px solid var(--r);background:rgba(255,0,0,.05)}
#api-status.live{color:var(--s);border:1px solid var(--s3);background:rgba(192,192,192,.05)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,0,0,.15);border-radius:1px}

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';import{OrbitControls}from'three/addons/controls/OrbitControls.js';

/* ─── EMBEDDED DATA (static fallback) ─── */
const EMBEDDED=EMBEDDED_DATA_PLACEHOLDER;

/* ─── CONSTANTS ─── */
const LOCAL_API='http://localhost:8199';
const TUNNELS=['https://icons-lambda-distances-emotions.trycloudflare.com','https://clinic-reason-mia-alike.trycloudflare.com'];
const POLL_MS=5000;
const RC={semantic:'#C0C0C0',graph:'#808080',episodic:'#FF0000',working:'#A0A0A0',procedural:'#FF3333',sensory:'#D0D0D0',drive:'#FF4444'};
const RP={semantic:{x:0,y:.25,z:-.55,r:.32},graph:{x:0,y:-.05,z:.05,r:.22},episodic:{x:.45,y:.05,z:.15,r:.24},working:{x:0,y:.5,z:.25,r:.27},procedural:{x:-.45,y:.05,z:.15,r:.24},sensory:{x:0,y:.55,z:.35,r:.19},drive:{x:0,y:-.5,z:-.2,r:.2}};
const EXT_COL={py:'#FF0000',json:'#C0C0C0',md:'#D0D0D0',db:'#404040',html:'#808080',js:'#A0A0A0',sh:'#707070',txt:'#505050',log:'#505050',index:'#FF3333',graphml:'#808080',pyc:'#303030',keep:'#202020',gitignore:'#202020',sample:'#303030'};
const AGENT_COL={hermes:'#FF0000','claude-code':'#FF3333','gemini-cli':'#C0C0C0',opencode:'#808080',codex:'#A0A0A0','kilo-code':'#D0D0D0','kimi-code':'#B0B0B0',jcode:'#E0E0E0',cline:'#909090',codebuff:'#707070',nullclaw:'#FF0000','9router':'#FF0000'};

/* ─── STATE ─── */
let apiURL='',scene,cam,ren,ctrl,ray,mouse=new THREE.Vector2();
let agentMeshes={},regionMeshes={},fileMeshes=[],agentData={},logs=[];
let liveMode=false,clock=new THREE.Clock();

/* ─── API DISCOVERY ─── */
async function findAPI(){
  if(apiURL)return apiURL;
  apiURL=LOCAL_API;
  if(location.hostname==='localhost'||location.hostname==='127.0.0.1')return apiURL;
  for(const t of TUNNELS){
    try{const r=await fetch(t+'/api/agents',{signal:AbortSignal.timeout(3000)});if(r.ok){apiURL=t;liveMode=true;return apiURL;}}catch{}
  }
  return apiURL;
}

/* ─── DATA MERGE: static + live ─── */
async function getData(){
  const base=JSON.parse(JSON.stringify(EMBEDDED));
  try{
    await findAPI();
    const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),4000);
    const[endA,endB,endF,endS,endAct]=await Promise.all([
      fetch(apiURL+'/api/agents',{signal:ctrl.signal}).catch(()=>null),
      fetch(apiURL+'/api/brain',{signal:ctrl.signal}).catch(()=>null),
      fetch(apiURL+'/api/files',{signal:ctrl.signal}).catch(()=>null),
      fetch(apiURL+'/api/sync',{signal:ctrl.signal}).catch(()=>null),
      fetch(apiURL+'/api/activity',{signal:ctrl.signal}).catch(()=>null)
    ]);
    if(endA){
      const d=await endA.json();
      /* Merge: live data overrides, inactive agents from embedded preserved */
      Object.keys(base.agents).forEach(k=>{base.agents[k].status='inactive';base.agents[k].pid=null;});
      Object.entries(d).forEach(([k,v])=>{base.agents[k]={...base.agents[k],...v,status:'active'};});
      liveMode=true;
    }
    if(endB){const d=await endB.json();Object.assign(base.brain,d);}
    if(endF){const d=await endF.json();Object.entries(d).forEach(([r,fs])=>{base.local_files=base.local_files.filter(f=>f.region!==r);fs.forEach(f=>base.local_files.push({...f,region:r}));});}
    if(endS){base.sync=await endS.json();}
    if(endAct){base.activity=await endAct.json();}
    document.getElementById('api-status').className=liveMode?'live':'local';
    document.getElementById('api-status').textContent=liveMode?'LIVE':'LOCAL DATA';
  }catch(e){console.warn('API unreachable, using embedded data',e);}
  return base;
}

/* ─── THREE.JS INIT ─── */
function init3D(){
  try{
  scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0x0a0a0a,.08);
  cam=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,.01,200);
  cam.position.set(0,.6,4.5);
  ren=new THREE.WebGLRenderer({canvas:document.getElementById('cv'),antialias:true,alpha:false});ren.setClearColor(0x0a0a0a,1);
  ren.setSize(innerWidth,innerHeight);ren.setPixelRatio(Math.min(devicePixelRatio,2));
  ren.toneMapping=THREE.ACESFilmicToneMapping;ren.toneMappingExposure=1.3;
  ctrl=new OrbitControls(cam,ren.domElement);
  ctrl.enableDamping=true;ctrl.dampingFactor=.07;ctrl.rotateSpeed=.5;ctrl.zoomSpeed=1.2;
  ctrl.minDistance=1.5;ctrl.maxDistance=12;ctrl.autoRotate=true;ctrl.autoRotateSpeed=.25;
  ray=new THREE.Raycaster();ray.params.Points={threshold:.05};
  /* Lights — red/silver */
  scene.add(new THREE.AmbientLight(0x1a0808,.5));
  const l1=new THREE.PointLight(0xFF0000,.8,25);l1.position.set(3,3,3);scene.add(l1);
  const l2=new THREE.PointLight(0x808080,.4,25);l2.position.set(-3,3,-3);scene.add(l2);
  const l3=new THREE.PointLight(0xFF0000,.3,15);l3.position.set(0,-2,0);scene.add(l3);
  /* Interaction */
 ren.domElement.addEventListener('pointerdown',onPointer);
 window.addEventListener('resize',onResize);
 animate();
 }catch(e){console.error('init3D failed:',e);throw e;}
}

function onResize(){cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight);}

function onPointer(e){
  mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;
  ray.setFromCamera(mouse,cam);
  /* Check files first, then regions, then agents */
  const fHits=ray.intersectObjects(fileMeshes);
  if(fHits.length){showFileDetail(fHits[0].object.userData);return;}
  const rHits=ray.intersectObjects(Object.values(regionMeshes));
  if(rHits.length){showRegionDetail(rHits[0].object.userData.name);return;}
  const aHits=ray.intersectObjects(Object.values(agentMeshes));
  if(aHits.length){showAgentDetail(aHits[0].object.userData.name);return;}
}

/* ─── BUILD 3D SCENE ─── */
function buildScene(data){
  buildBrainShell();
  buildRegions(data.brain);
  buildFileNodes(data.local_files.concat(data.drive_files||[]));
  buildAgentNodes(data.agents);
  buildDendrites(data);
}

function buildBrainShell(){
  const mat=new THREE.MeshPhongMaterial({color:0x0d0505,transparent:true,opacity:.25,shininess:80,specular:0xFF0000,side:THREE.DoubleSide,depthWrite:false});
  const g=new THREE.Group();
  const h1=new THREE.Mesh(new THREE.SphereGeometry(1,48,48),mat);h1.position.x=-.03;h1.renderOrder=0;g.add(h1);
  const h2=new THREE.Mesh(new THREE.SphereGeometry(1,48,48),mat);h2.position.x=.03;h2.renderOrder=0;g.add(h2);
  const stem=new THREE.Mesh(new THREE.CylinderGeometry(.1,.07,.5,12),new THREE.MeshPhongMaterial({color:0x080505,transparent:true,opacity:.3,side:THREE.DoubleSide,depthWrite:false}));
  stem.position.set(0,-.85,-.15);stem.rotation.x=.3;g.add(stem);
  const cb=new THREE.Mesh(new THREE.SphereGeometry(.28,24,24),new THREE.MeshPhongMaterial({color:0x080505,transparent:true,opacity:.3,side:THREE.DoubleSide,depthWrite:false}));
  cb.position.set(0,-.55,-.5);g.add(cb);
  scene.add(g);
}

function buildRegions(brain){
  Object.entries(RP).forEach(([name,pos])=>{
    const col=new THREE.Color(RC[name]||'#808080');
    const geo=new THREE.IcosahedronGeometry(pos.r*.12,1);
    const mat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.55,wireframe:true});
    const m=new THREE.Mesh(geo,mat);m.position.set(pos.x,pos.y,pos.z);
    m.userData={type:'region',name};
    m.renderOrder=2;
    scene.add(m);regionMeshes[name]=m;
    /* Glow sphere */
    const glow=new THREE.Mesh(new THREE.SphereGeometry(pos.r*.18,16,16),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.08,side:THREE.DoubleSide,depthWrite:false}));
    glow.position.copy(m.position);glow.renderOrder=1;scene.add(glow);
  });
}

function buildFileNodes(files){
  /* Clear old */
  fileMeshes.forEach(m=>scene.remove(m));fileMeshes=[];
  const byRegion={};
  files.forEach(f=>{const r=f.region||'working';if(!byRegion[r])byRegion[r]=[];byRegion[r].push(f);});
  Object.entries(byRegion).forEach(([region,fs])=>{
    const rc=RP[region]||RP.working;
    fs.forEach((f,i)=>{
      const ext=(f.name||f.path||'').split('.').pop()||'file';
      const col=EXT_COL[ext]||'#505050';
      const geo=new THREE.OctahedronGeometry(.015,0);
      const mat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.85});
      const m=new THREE.Mesh(geo,mat);
      /* Position in spiral around region center */
      const angle=i*(2.5/((fs.length||1)+.01))*Math.PI;
      const rad=rc.r*.35+Math.random()*.08;
      const yOff=(Math.random()-.5)*rc.r*.3;
      m.position.set(rc.x+Math.cos(angle)*rad,rc.y+yOff,rc.z+Math.sin(angle)*rad);
      m.userData={type:'file',name:f.name||f.path,path:f.path,size:f.size,region};
      m.renderOrder=3;
      scene.add(m);fileMeshes.push(m);
    });
  });
}

function buildAgentNodes(agents){
  Object.values(agentMeshes).forEach(m=>scene.remove(m));agentMeshes={};
  Object.entries(agents).forEach(([name,a])=>{
    const col=AGENT_COL[name]||a.color||'#808080';
    const rc=RP[a.region||'working']||RP.working;
    const geo=new THREE.SphereGeometry(.04,12,12);
    const mat=new THREE.MeshPhongMaterial({color:col,emissive:new THREE.Color(col),emissiveIntensity:a.status==='active'?.6:.1,shininess:100,specular:0xFFFFFF});
    const m=new THREE.Mesh(geo,mat);
    m.position.set(rc.x+(Math.random()-.5)*.15,rc.y+rc.r*.6+.1,rc.z+(Math.random()-.5)*.15);
    m.userData={type:'agent',name,...a};
    m.renderOrder=5;
    if(a.status!=='active'){mat.transparent=true;mat.opacity=.3;}
    scene.add(m);agentMeshes[name]=m;
    /* Agent label — small ring */
    const ring=new THREE.Mesh(new THREE.TorusGeometry(.06,.005,8,24),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:a.status==='active'?.6:.15}));
    ring.position.copy(m.position);ring.rotation.x=Math.PI/2;ring.renderOrder=5;
    scene.add(ring);agentMeshes[name+'_ring']=ring;
  });
}

function buildDendrites(data){
  /* Connect agents to their region centers */
  Object.entries(data.agents).forEach(([name,a])=>{
    const m=agentMeshes[name];if(!m)return;
    const rc=RP[a.region||'working'];if(!rc)return;
    const pts=[m.position.clone(),new THREE.Vector3(rc.x,rc.y,rc.z)];
    const geo=new THREE.BufferGeometry().setFromPoints(pts);
    const col=AGENT_COL[name]||'#808080';
    const mat=new THREE.LineBasicMaterial({color:col,transparent:true,opacity:a.status==='active'?.3:.05});
    const line=new THREE.Line(geo,mat);line.renderOrder=1;scene.add(line);
  });
  /* Connect nearby file nodes */
  const maxDend=Math.min(fileMeshes.length*2,120);
  let count=0;
  for(let i=0;i<fileMeshes.length&&count<maxDend;i++){
    for(let j=i+1;j<fileMeshes.length&&count<maxDend;j++){
      const d=fileMeshes[i].position.distanceTo(fileMeshes[j].position);
      if(d<.2){
        const pts=[fileMeshes[i].position.clone(),fileMeshes[j].position.clone()];
        const geo=new THREE.BufferGeometry().setFromPoints(pts);
        const mat=new THREE.LineBasicMaterial({color:0x202020,transparent:true,opacity:.12});
        const line=new THREE.Line(geo,mat);line.renderOrder=0;scene.add(line);count++;
      }
    }
  }
}

/* ─── UI UPDATES ─── */
function updateAgents(agents){
  agentData=agents;
  let h='';
  const sorted=Object.entries(agents).sort((a,b)=>{const o={active:0,inactive:1,dormant:2};return(o[a[1].status]||3)-(o[b[1].status]||3);});
  sorted.forEach(([name,a])=>{
    const off=a.status!=='active'?' off':'';
    const col=AGENT_COL[name]||a.color||'#333';
    const st=a.status==='active'?'●':'○';
    h+=`<div class="ac${off}" onclick="showAgentDetail('${name}')"><div class="ad" style="color:${col};background:${col}"></div><div class="an">${st} ${name}</div><div class="ar">${a.region||'—'}</div></div>`;
  });
  document.getElementById('al').innerHTML=h;
}

function updateRegions(brain){
  let h='';
  Object.entries(brain).forEach(([k,v])=>{
    const col=v.color||RC[k]||'#808080';
    const cnt=v.file_count||0;
    h+=`<div class="sc" onclick="showRegionDetail('${k}')" style="cursor:pointer"><div class="rr"><span class="rl" style="color:${col}">${v.name||k}</span><span class="rv">${cnt} files</span></div><div class="rb"><div class="rf" style="width:${Math.min(cnt*4,100)}%;background:${col}"></div></div></div>`;
  });
  document.getElementById('rl').innerHTML=h;
}

function updateFiles(files){
  const total=files.length;
  const byRegion={};
  files.forEach(f=>{const r=f.region||'working';byRegion[r]=(byRegion[r]||0)+1;});
  let h=`<div class="rr"><span class="rl">Total</span><span class="rv">${total}</span></div>`;
  Object.entries(byRegion).forEach(([r,c])=>{
    h+=`<div class="rr"><span class="rl" style="color:${RC[r]||'#808080'}">${r}</span><span class="rv">${c}</span></div>`;
  });
  document.getElementById('fl').innerHTML=h;
}

function updateSync(sync){
  if(!sync)return;
  const st=sync.status||'unknown';
  const col=st==='connected'?'var(--s)':'var(--r)';
  let h=`<div class="rr"><span class="rl">Status</span><span class="rv" style="color:${col}">${st}</span></div>`;
  if(sync.last_sync)h+=`<div class="rr"><span class="rl">Last</span><span class="rv">${sync.last_sync}</span></div>`;
  document.getElementById('sl').innerHTML=h;
}

function addLog(msg,agent){
  if(logs.some(l=>l.msg===msg&&l.agent===agent))return;
  logs.unshift({t:new Date().toLocaleTimeString(),msg,agent});
  if(logs.length>40)logs.length=40;
  const h=logs.map(l=>{
    const col=AGENT_COL[l.agent]||RC[l.agent]||'#C0C0C0';
    return`<div class="ll"><span class="lt">${l.t}</span><span class="la" style="color:${col}">${l.agent}</span><span class="lm">${l.msg}</span></div>`;
  }).join('');
  document.getElementById('af').innerHTML=h;
}

/* ─── DETAIL PANELS ─── */
function showAgentDetail(name){
  const a=agentData[name]||{};const col=AGENT_COL[name]||a.color||'#808080';
  const status=a.status||'inactive';const pid=a.pid||'—';const cpu=a.cpu||'0';const mem=a.mem||'0';
  let h=`<div class="ds"><div class="dl">Status</div><div class="dt" style="color:${status==='active'?'var(--s)':'var(--s2)'}">${status.toUpperCase()}</div></div>`;
  h+=`<div class="ds"><div class="dl">Info</div><div class="dt">${a.desc||name}</div></div>`;
  h+=`<div class="ds"><div class="dl">Metrics</div><div class="dg"><div class="dgi"><div class="dgl">PID</div><div class="dgv">${pid}</div></div><div class="dgi"><div class="dgl">CPU</div><div class="dgv">${cpu}%</div></div><div class="dgi"><div class="dgl">MEM</div><div class="dgv">${mem}%</div></div><div class="dgi"><div class="dgl">Region</div><div class="dgv" style="color:${RC[a.region||'']||'#808080'}">${a.region||'—'}</div></div></div></div>`;
  /* Files this agent is associated with */
  const agentFiles=(EMBEDDED.local_files||[]).filter(f=>f.region===(a.region||'')).slice(0,8);
  if(agentFiles.length){
    h+=`<div class="ds"><div class="dl">Associated Files</div><ul class="df">`;
    agentFiles.forEach(f=>{h+=`<li><span class="fn">${f.name||f.path}</span><span class="fs">${formatSize(f.size)}</span></li>`;});
    h+=`</ul></div>`;
  }
  openD(h,'A',name.toUpperCase(),col);
}

function showRegionDetail(name){
  const brain=EMBEDDED.brain||{};const r=brain[name]||{};const col=RC[name]||'#808080';
  const files=(EMBEDDED.local_files||[]).filter(f=>f.region===name);
  let h=`<div class="ds"><div class="dl">Region</div><div class="dt" style="color:${col}">${r.name||name}</div></div>`;
  h+=`<div class="ds"><div class="dl">Description</div><div class="dt">${r.description||'Brain region'}</div></div>`;
  h+=`<div class="ds"><div class="dl">Stats</div><div class="dg"><div class="dgi"><div class="dgl">Files</div><div class="dgv">${files.length}</div></div><div class="dgi"><div class="dgl">Size</div><div class="dgv">${formatSize(files.reduce((s,f)=>s+(f.size||0),0))}</div></div></div></div>`;
  if(files.length){
    h+=`<div class="ds"><div class="dl">Files</div><ul class="df">`;
    files.forEach(f=>{h+=`<li><span class="fn">${f.name||f.path}</span><span class="fs">${formatSize(f.size)}</span></li>`;});
    h+=`</ul></div>`;
  }
  /* Agents in this region */
  const regionAgents=Object.entries(agentData).filter(([_,a])=>a.region===name).map(([n])=>n);
  if(regionAgents.length){
    h+=`<div class="ds"><div class="dl">Agents</div><div class="dt">${regionAgents.join(', ')}</div></div>`;
  }
  openD(h,'R',name.toUpperCase(),col);
}

function showFileDetail(f){
  const col=RC[f.region]||EXT_COL[(f.name||'').split('.').pop()]||'#808080';
  let h=`<div class="ds"><div class="dl">File</div><div class="dt">${f.name||f.path}</div></div>`;
  h+=`<div class="ds"><div class="dl">Path</div><div class="dt" style="font-size:8px;color:var(--s2)">${f.path}</div></div>`;
  h+=`<div class="ds"><div class="dl">Stats</div><div class="dg"><div class="dgi"><div class="dgl">Size</div><div class="dgv">${formatSize(f.size)}</div></div><div class="dgi"><div class="dgl">Region</div><div class="dgv" style="color:${RC[f.region]||'#808080'}">${f.region}</div></div></div></div>`;
  openD(h,'F',(f.name||'?')[0].toUpperCase(),col);
}

function showNullclaw(){
  let h=`<div class="ds"><div class="dl">Nullclaw Router</div><div class="dt">AI routing proxy with 999 concurrent connections. Shares process with 9Router on localhost:20128. Routes LLM requests across multiple providers (NVIDIA, Groq, Gemini, etc.) with automatic failover and load balancing.</div></div>`;
  h+=`<div class="ds"><div class="dl">Purpose</div><div class="dt">This tab provides quick access to the Nullclaw/9Router admin interface. The router is the backbone of your multi-agent system — every LLM call flows through it.</div></div>`;
  h+=`<div class="ds"><div class="dl">Endpoint</div><div class="dt" style="font-size:9px">localhost:20128/v1/models</div></div>`;
  openD(h,'N','NULLCLAW','#FF0000');
}

function openD(html,icon,title,col){
  document.getElementById('di').textContent=icon;
  document.getElementById('dt').textContent=title;
  document.getElementById('di').style.background=col||'var(--r)';
  document.getElementById('di').style.boxShadow=`0 0 15px ${col||'var(--r)'}`;
  document.getElementById('db').innerHTML=html;
  document.getElementById('dp').classList.add('open');
  document.getElementById('ov').classList.add('open');
}
function closeD(){document.getElementById('dp').classList.remove('open');document.getElementById('ov').classList.remove('open');}
function formatSize(b){if(!b)return'0B';if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'K';return(b/1048576).toFixed(1)+'M';}

/* ─── ANIMATION ─── */
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  ctrl.update();
  /* Rotate file nodes */
  fileMeshes.forEach((m,i)=>{m.rotation.x=t*.3+i;m.rotation.y=t*.2+i;m.position.y+=Math.sin(t*1.5+i*.7)*.0002;});
  /* Pulse active agents */
  Object.entries(agentMeshes).forEach(([name,m])=>{
    if(!m||name.includes('_ring'))return;
    const a=agentData[name]||{};
    if(a.status==='active'){m.position.y+=Math.sin(t*2+name.length)*.001;m.scale.setScalar(1+Math.sin(t*3+name.length)*.08);}
    else{m.scale.setScalar(.6);}
  });
  /* Rotate agent rings */
  Object.entries(agentMeshes).forEach(([name,m])=>{
    if(name.includes('_ring'))m.rotation.z=t*.5;
  });
  /* Pulse region glows */
  Object.values(regionMeshes).forEach((m,i)=>{m.rotation.y=t*.2+i;m.material.opacity=.4+Math.sin(t+i)*.15;});
  ren.render(scene,cam);
}

/* ─── REFRESH LOOP ─── */
async function refresh(){
  const data=await getData();
  updateAgents(data.agents||{});
  updateRegions(data.brain||{});
  updateFiles(data.local_files||[]);
  updateSync(data.sync||{});
  /* Rebuild 3D agents if status changed */
  const prevKeys=Object.keys(agentMeshes).filter(k=>!k.includes('_ring')).sort();
  const newKeys=Object.keys(data.agents||{}).sort();
  if(JSON.stringify(prevKeys)!==JSON.stringify(newKeys)||prevKeys.some((k,i)=>(agentData[k]||{}).status!==((data.agents||{})[k]||{}).status)){
    buildAgentNodes(data.agents||{});
  }
  /* Activity feed */
  if(data.activity){data.activity.forEach(a=>addLog(a.action+': '+a.target,a.agent));}
}

/* ─── BOOT ─── */
async function boot(){
  init3D();
  const data=await getData();
  buildScene(data);
  updateAgents(data.agents||{});
  updateRegions(data.brain||{});
  updateFiles(data.local_files||[]);
  updateSync(data.sync||{});
  /* Initial activity */
  addLog('Neural core initialized','system');
  addLog(Object.keys(data.agents||{}).filter(k=>data.agents[k].status==='active').length+' agents active','system');
  addLog((data.local_files||[]).length+' files mapped','system');
  /* Hide loading */
  document.getElementById('ld').classList.add('hide');
  /* Clock */
  const updateClock=()=>document.getElementById('clk').textContent=new Date().toLocaleTimeString();
  updateClock();setInterval(updateClock,1000);
  /* Poll */
  setInterval(refresh,POLL_MS);
}

/* ─── GLOBAL EXPORTS ─── */
window.showAgentDetail=showAgentDetail;window.showRegionDetail=showRegionDetail;
window.showFileDetail=showFileDetail;window.showNullclaw=showNullclaw;window.closeD=closeD;

boot().catch(e=>{console.error('Boot failed:',e);document.getElementById('ld').textContent='ERROR: '+e.message;});
</script>
