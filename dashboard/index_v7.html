<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>AkpanBrain — Neural Dashboard v7</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--panel:rgba(8,8,8,0.95);--border:#1a1a1a;--red:#ff0040;--silver:#c0c0c0;--dim:#333;--glow:#ff004060}
html,body{background:var(--bg);color:var(--silver);font-family:'Courier New',monospace;overflow:hidden;height:100%;width:100%;touch-action:none}
#cv{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
#bloom{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;mix-blend-mode:screen;filter:blur(8px) brightness(1.5);opacity:0.35;image-rendering:pixelated}
#scanlines{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);opacity:0.5}
#vignette{position:fixed;top:0;left:0;width:100%;height:100%;z-index:3;pointer-events:none;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.6) 100%)}
#scan-sweep{position:fixed;top:0;left:0;width:100%;height:4px;z-index:4;pointer-events:none;background:linear-gradient(180deg,transparent,rgba(255,0,64,0.06),transparent);animation:sweep 4s linear infinite}
@keyframes sweep{0%{top:-4px}100%{top:100%}}
#hud{position:fixed;top:0;right:0;width:300px;height:100vh;z-index:10;overflow-y:auto;background:var(--panel);border-left:1px solid var(--border);scrollbar-width:thin;scrollbar-color:#333 transparent;transition:transform .3s ease}
#hud::-webkit-scrollbar{width:3px}
#hud::-webkit-scrollbar-thumb{background:#222}
@media(max-width:768px){
 #hud{top:auto;bottom:0;right:0;left:0;width:100%;height:45vh;max-height:45vh;border-left:none;border-top:1px solid var(--border);border-radius:12px 12px 0 0;transform:translateY(calc(100% - 44px))}
 #hud.expanded{transform:translateY(0)}
 #hud-handle{display:flex!important}
}
#hud-handle{display:none;justify-content:center;padding:8px 0 4px;cursor:pointer}
#hud-handle div{width:40px;height:4px;background:#333;border-radius:2px}
.hdr{padding:10px 14px;border-bottom:1px solid var(--border)}
.hdr h2{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--red)}
.hdr .sub{font-size:8px;color:#444;margin-top:2px}
.stat-row{display:flex;justify-content:space-between;padding:4px 14px;font-size:9px;border-bottom:1px solid #0e0e0e}
.stat-row .k{color:#555}.stat-row .v{color:var(--silver)}
.agent-card{padding:6px 14px;border-bottom:1px solid #0e0e0e;cursor:pointer;transition:background .15s}
.agent-card:hover,.agent-card:active{background:#151515}
.agent-card.active{border-left:2px solid var(--red)}
.agent-card.inactive{border-left:2px solid #1a1a1a;opacity:0.35}
.agent-name{font-size:10px;font-weight:bold}
.agent-meta{font-size:8px;color:#444;margin-top:1px}
.agent-pos{font-size:7px;color:#ff004060;margin-top:1px}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:5px;vertical-align:middle}
.dot.on{background:var(--red);box-shadow:0 0 4px var(--red)}
.dot.off{background:#222}
#region-list{padding:6px 14px}
.region-item{font-size:8px;padding:2px 0;color:#444;cursor:pointer;transition:background .15s}
.region-item:hover{background:#151515}
.region-item span{color:var(--red);margin-right:3px}
#feed{padding:6px 14px;max-height:160px;overflow-y:auto}
.feed-item{font-size:7px;color:#333;padding:1px 0;border-bottom:1px solid #0c0c0c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feed-item .ts{color:#222;margin-right:3px}
#ld{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:100;color:var(--red);font-size:12px;text-align:center;letter-spacing:3px;text-transform:uppercase}
#api-status{position:fixed;bottom:6px;left:6px;z-index:20;font-size:7px;color:#222;letter-spacing:1px}
.tab-bar{display:flex;padding:0 14px;border-bottom:1px solid var(--border)}
.tab{font-size:8px;padding:5px 8px;color:#333;cursor:pointer;letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid transparent}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.tab:hover{color:var(--silver)}
#detail{padding:10px 14px;font-size:9px;color:#666;display:none;border-top:1px solid var(--border);background:#0a0a0a}
#detail h3{font-size:10px;color:var(--red);margin-bottom:6px;letter-spacing:1px}
#detail .d-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #0e0e0e}
#detail .d-row .dk{color:#555;font-size:8px}
#detail .d-row .dv{color:var(--silver);font-size:8px}
#detail .close-btn{float:right;cursor:pointer;color:#ff004060;font-size:10px}
#detail .close-btn:hover{color:var(--red)}
#tooltip{position:fixed;z-index:20;pointer-events:none;background:rgba(0,0,0,0.9);border:1px solid #ff004040;color:var(--silver);font-size:8px;padding:4px 8px;border-radius:3px;max-width:200px;display:none;font-family:'Courier New',monospace;letter-spacing:0.5px}
#touch-hint{display:none;position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:15;font-size:8px;color:#333;letter-spacing:1px;pointer-events:none}
@media(max-width:768px){#touch-hint{display:block}}
</style>
</head>
<body>
<div id="ld">INITIALIZING NEURAL CORE...</div>
<canvas id="cv"></canvas>
<canvas id="bloom"></canvas>
<div id="scanlines"></div>
<div id="vignette"></div>
<div id="scan-sweep"></div>
<div id="tooltip"></div>
<div id="touch-hint">DRAG TO ROTATE · PINCH TO ZOOM · TAP TO INSPECT</div>
<div id="hud">
 <div id="hud-handle" onclick="this.parentElement.classList.toggle('expanded')"><div></div></div>
 <div class="hdr"><h2>● AkpanBrain</h2><div class="sub" id="brain-status">Neural Network Dashboard</div></div>
 <div class="tab-bar"><div class="tab active" data-tab="agents">AGENTS</div><div class="tab" data-tab="brain">BRAIN</div><div class="tab" data-tab="feed">FEED</div><div class="tab" data-tab="drive">DRIVE</div></div>
 <div id="tab-agents">
  <div class="hdr"><h2>Active Agents</h2><div class="sub" id="agent-count">0 detected</div></div>
  <div id="agent-list"></div>
 </div>
 <div id="tab-brain" style="display:none">
  <div class="hdr"><h2>Brain Regions</h2><div class="sub">6 neural regions</div></div>
  <div id="region-list"></div>
 </div>
 <div id="tab-feed" style="display:none">
  <div class="hdr"><h2>Activity Feed</h2><div class="sub" id="feed-count">0 events</div></div>
  <div id="feed"></div>
 </div>
 <div id="tab-drive" style="display:none">
  <div class="hdr"><h2>Drive Sync</h2><div class="sub">Google Drive Integration</div></div>
  <div id="drive-info"></div>
 </div>
 <div id="detail">
  <span class="close-btn" onclick="document.getElementById('detail').style.display='none'">✕</span>
  <h3 id="detail-title">—</h3>
  <div id="detail-body"></div>
 </div>
</div>
<div id="api-status">CONNECTING...</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// ALL STATE AT TOP
// ═══════════════════════════════════════════════════════════════════

var EMBEDDED=$EMBEDded$;
var agents={},brain={},positions={},regions={},activityFeed=[];
var scene,cam,ren,clock=null;

// Neuron config
var NEURON_COUNT=40;
var HUB_COUNT=8;
var MAX_SYNAPSES=200;
var MAX_PULSES=12;

// Region data
var REGION_POS={
 semantic:{x:-3,y:1.2,z:0},graph:{x:-1.5,y:0.5,z:-2},
 episodic:{x:0,y:-0.8,z:-1.5},working:{x:1.5,y:1,z:1.2},
 procedural:{x:3,y:-0.3,z:0},sensory:{x:0.8,y:1.8,z:-1}
};
var REGION_COLORS={
 semantic:0xc0c0c0,graph:0x808080,episodic:0xff0040,
 working:0xa0a0a0,procedural:0xff3333,sensory:0xd0d0d0
};
var REGION_NAMES={
 semantic:'Semantic Cortex',graph:'Knowledge Graph',episodic:'Memory Hippocampus',
 working:'Working Memory',procedural:'Procedural Cortex',sensory:'Sensory Buffer'
};
var AGENT_COLORS={
 hermes:0xff0040,'gemini-cli':0x4488ff,'kilo-code':0x800000,'kimi-code':0xa0a0ff,
 nullclaw:0xff3333,'claude-code':0xcc8844,opencode:0x404040,'qwen-code':0x6060ff,
 codebuff:0x808080,jcode:0x555555,'claw-code':0xff4444,cline:0xb0b0b0,
 ironclaw:0xcc0000,openfang:0xff2222,codex:0xe0e0e0,'9router':0xff0040
};

// Scene objects
var neuronPositions=[];
var neuronIsHub=[];
var neuronRegionMap=[]; // which region each neuron belongs to
var synapseData=[];
var neuronInstMesh=null;
var neuronGlowInstMesh=null;
var synapseLineSegs=null;
var agentOrbs={};
var pulsePool=[];
var neuronFireTimes=new Float32Array(NEURON_COUNT);
var nextFire=0;
var electricArcs=[]; // lightning bolts between firing neurons

// Camera
var camAngle=0,camRadius=7,camHeight=1.5;
var isDragging=false,pinchDist=0;
var dragStart={x:0,y:0},dragAngle=0,dragHeight=0;

// Raycasting
var raycaster=new THREE.Raycaster();
var mouse=new THREE.Vector2();
var hoveredObj=null;
var selectedObj=null;

// Tooltip
var tooltipEl=null;

// Region core meshes (for raycasting)
var regionMeshes={};

// WebSocket
var ws=null,wsReconnect=0;

// ═══════════════════════════════════════════════════════════════════
// 3D SCENE INIT
// ═══════════════════════════════════════════════════════════════════

function init3D(){
 clock=new THREE.Clock();
 scene=new THREE.Scene();
 scene.fog=new THREE.FogExp2(0x0a0a0a,0.025);
 
 cam=new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,0.1,100);
 cam.position.set(0,camHeight,camRadius);
 cam.lookAt(0,0,0);
 
 ren=new THREE.WebGLRenderer({
  canvas:document.getElementById('cv'),
  antialias:false,
  alpha:false,
  powerPreference:'high-performance'
 });
 ren.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
 ren.setSize(window.innerWidth,window.innerHeight);
 ren.setClearColor(0x0a0a0a,1);
 
 // Bloom canvas
 var bloomCv=document.getElementById('bloom');
 bloomCv.width=Math.floor(window.innerWidth/4);
 bloomCv.height=Math.floor(window.innerHeight/4);
 bloomCv.style.width=window.innerWidth+'px';
 bloomCv.style.height=window.innerHeight+'px';
 window._bloomCv=bloomCv;
 window._bloomCtx=bloomCv.getContext('2d');
 
 // Tooltip element
 tooltipEl=document.getElementById('tooltip');
 
 // Lighting
 scene.add(new THREE.AmbientLight(0x111111,0.3));
 var pl=new THREE.PointLight(0xff0040,1.5,20);
 pl.position.set(0,3,0);
 scene.add(pl);
 var pl2=new THREE.PointLight(0x404040,0.5,25);
 pl2.position.set(-5,-3,5);
 scene.add(pl2);
 
 setupInput();
 generateNeurons();
 buildInstancedNeurons();
 buildSynapseLines();
 buildRegionCores();
 buildAgentOrbs();
 initPulsePool();
 buildStarfield();
 buildGridFloor();
 
 window.addEventListener('resize',onResize);
 document.getElementById('ld').style.display='none';
 window.__booted=true;
 window.__scene=scene;
 window.__neuronCount=NEURON_COUNT;
 animate();
}

// ═══════════════════════════════════════════════════════════════════
// INPUT (touch + mouse + click)
// ═══════════════════════════════════════════════════════════════════

function setupInput(){
 var cv=ren.domElement;
 var pointerDownTime=0;
 var pointerDownPos={x:0,y:0};
 
 cv.addEventListener('pointerdown',function(e){
  isDragging=true;
  pointerDownTime=Date.now();
  pointerDownPos={x:e.clientX,y:e.clientY};
  dragStart={x:e.clientX,y:e.clientY};
  dragAngle=camAngle;
  dragHeight=camHeight;
  if(e.pointerId!==undefined)cv.setPointerCapture(e.pointerId);
 });
 
 window.addEventListener('pointerup',function(e){
  isDragging=false;
  // Detect click (short press, minimal movement)
  var dt=Date.now()-pointerDownTime;
  var dx=Math.abs(e.clientX-pointerDownPos.x);
  var dy=Math.abs(e.clientY-pointerDownPos.y);
  if(dt<300&&dx<8&&dy<8){
   handleClick(e.clientX,e.clientY);
  }
 });
 
 window.addEventListener('pointermove',function(e){
  if(isDragging){
   camAngle=dragAngle+(e.clientX-dragStart.x)*0.004;
   camHeight=dragHeight-(e.clientY-dragStart.y)*0.008;
   camHeight=Math.max(-2,Math.min(6,camHeight));
  }
  // Update hover
  updateHover(e.clientX,e.clientY);
 });
 
 cv.addEventListener('wheel',function(e){
  camRadius+=e.deltaY*0.004;
  camRadius=Math.max(3,Math.min(15,camRadius));
  e.preventDefault();
 },{passive:false});
 
 // Pinch zoom (mobile)
 var lastPinch=0;
 cv.addEventListener('touchstart',function(e){
  if(e.touches.length===2){
   var dx=e.touches[0].clientX-e.touches[1].clientX;
   var dy=e.touches[0].clientY-e.touches[1].clientY;
   lastPinch=Math.sqrt(dx*dx+dy*dy);
  }
 },{passive:true});
 cv.addEventListener('touchmove',function(e){
  if(e.touches.length===2&&lastPinch>0){
   var dx=e.touches[0].clientX-e.touches[1].clientX;
   var dy=e.touches[0].clientY-e.touches[1].clientY;
   var d=Math.sqrt(dx*dx+dy*dy);
   camRadius*=lastPinch/d;
   camRadius=Math.max(3,Math.min(15,camRadius));
   lastPinch=d;
   e.preventDefault();
  }
 },{passive:false});
 cv.addEventListener('touchend',function(){lastPinch=0},{passive:true});
}

// ═══════════════════════════════════════════════════════════════════
// RAYCASTING — Click & Hover in 3D
// ═══════════════════════════════════════════════════════════════════

function getClickableObjects(){
 var objs=[];
 // Agent hitboxes (transparent, large click targets)
 var names=Object.keys(agentOrbs);
 for(var i=0;i<names.length;i++){
  var orb=agentOrbs[names[i]];
  if(orb.visible&&orb.hitbox){
   orb.hitbox.visible=true; // ensure it stays raycastable
   objs.push(orb.hitbox);
  }
 }
 // Region cores
 var rNames=Object.keys(regionMeshes);
 for(var i=0;i<rNames.length;i++){
  regionMeshes[rNames[i]].userData={type:'region',name:rNames[i]};
  objs.push(regionMeshes[rNames[i]]);
 }
 // Also add neuron instances for clicking
 if(neuronInstMesh){
  neuronInstMesh.userData={type:'neurons'};
  objs.push(neuronInstMesh);
 }
 return objs;
}

function handleClick(cx,cy){
 mouse.x=(cx/window.innerWidth)*2-1;
 mouse.y=-(cy/window.innerHeight)*2+1;
 raycaster.setFromCamera(mouse,cam);
 var hits=raycaster.intersectObjects(getClickableObjects());
 
 if(hits.length>0){
  var hit=hits[0].object;
  var ud=hit.userData;
 if(ud){
 if(ud.type==='agent'){
 showAgentDetail(ud.name);
 focusOnAgent(ud.name);
 }else if(ud.type==='region'){
 showRegionDetail(ud.name);
 focusOnPosition(REGION_POS[ud.name]);
 }else if(ud.type==='neurons'&&hits[0].instanceId!==undefined){
 // Clicked a neuron instance
 var nid=hits[0].instanceId;
 var nRegion=neuronRegionMap[nid]||'unknown';
 var isHub=neuronIsHub[nid]||false;
 var nPos=neuronPositions[nid];
 showNeuronDetail(nid,nRegion,isHub,nPos);
 focusOnPosition(nPos);
 }
 }
  selectedObj=hit;
 }else{
  // Clicked empty space — deselect
  document.getElementById('detail').style.display='none';
  selectedObj=null;
 }
}

function updateHover(cx,cy){
 mouse.x=(cx/window.innerWidth)*2-1;
 mouse.y=-(cy/window.innerHeight)*2+1;
 raycaster.setFromCamera(mouse,cam);
 var hits=raycaster.intersectObjects(getClickableObjects());
 
 if(hits.length>0){
  var hit=hits[0].object;
  var ud=hit.userData;
  if(ud){
   tooltipEl.style.display='block';
   tooltipEl.style.left=(cx+14)+'px';
   tooltipEl.style.top=(cy-10)+'px';
   if(ud.type==='agent'){
    var a=agents[ud.name]||{};
    tooltipEl.innerHTML='<b style="color:#'+(AGENT_COLORS[ud.name]||0xff0040).toString(16).padStart(6,'0')+'">'+ud.name+'</b><br>'+((a.status||'unknown').toUpperCase())+' · '+(a.type||'agent');
 }else if(ud.type==='region'){
 tooltipEl.innerHTML='<b style="color:#'+(REGION_COLORS[ud.name]||0xff0040).toString(16).padStart(6,'0')+'">'+(REGION_NAMES[ud.name]||ud.name)+'</b><br>brain region';
 }else if(ud.type==='neurons'&&hits[0].instanceId!==undefined){
 var nid=hits[0].instanceId;
 var isHub=neuronIsHub[nid]||false;
 tooltipEl.innerHTML='<b style="color:#ff0040">NEURON #'+nid+'</b><br>'+(isHub?'HUB':'NORMAL')+' · '+(REGION_NAMES[neuronRegionMap[nid]]||neuronRegionMap[nid]||'?');
 }
   document.body.style.cursor='pointer';
   hoveredObj=hit;
  }
 }else{
  tooltipEl.style.display='none';
  document.body.style.cursor='default';
  hoveredObj=null;
 }
}

function focusOnAgent(name){
 var orb=agentOrbs[name];
 if(orb&&orb.visible){
  focusOnPosition(orb.currentPos);
 }
}

function focusOnPosition(pos){
 camHeight=(pos.y||0)+1;
 camRadius=4;
 camAngle=Math.atan2(pos.x||0,pos.z||0)+Math.PI*0.3;
}

// ═══════════════════════════════════════════════════════════════════
// DETAIL PANELS (click to inspect)
// ═══════════════════════════════════════════════════════════════════

function showAgentDetail(name){
 var a=agents[name]||{};
 var pos=positions[name]||{};
 var det=document.getElementById('detail');
 document.getElementById('detail-title').textContent=name.toUpperCase();
 
 var html='';
 html+='<div class="d-row"><span class="dk">STATUS</span><span class="dv" style="color:'+(a.status==='active'?'#ff0040':'#333')+'">● '+(a.status||'unknown').toUpperCase()+'</span></div>';
 html+='<div class="d-row"><span class="dk">TYPE</span><span class="dv">'+(a.type||'agent')+'</span></div>';
 if(pos.region)html+='<div class="d-row"><span class="dk">REGION</span><span class="dv">'+(REGION_NAMES[pos.region]||pos.region)+'</span></div>';
 if(pos.file)html+='<div class="d-row"><span class="dk">FILE</span><span class="dv">'+pos.file+'</span></div>';
 if(pos.action)html+='<div class="d-row"><span class="dk">ACTION</span><span class="dv">'+pos.action+'</span></div>';
 if(pos.x!==undefined)html+='<div class="d-row"><span class="dk">POS</span><span class="dv">'+(pos.x||0).toFixed(1)+', '+(pos.y||0).toFixed(1)+', '+(pos.z||0).toFixed(1)+'</span></div>';
 
 // Find recent activity for this agent
 var agentActivity=activityFeed.filter(function(e){return e.agent===name}).slice(0,5);
 if(agentActivity.length>0){
  html+='<div style="margin-top:6px;font-size:7px;color:#ff004060;letter-spacing:1px">RECENT ACTIVITY</div>';
  for(var i=0;i<agentActivity.length;i++){
   var e=agentActivity[i];
   var ts=new Date(e.ts).toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
   html+='<div class="d-row"><span class="dk">'+ts+'</span><span class="dv">'+e.action+' '+(e.target||'')+'</span></div>';
  }
 }
 
 document.getElementById('detail-body').innerHTML=html;
 det.style.display='block';
}

function showRegionDetail(name){
 var b=brain[name]||{};
 var det=document.getElementById('detail');
 document.getElementById('detail-title').textContent=(REGION_NAMES[name]||name).toUpperCase();
 
 var html='';
 html+='<div class="d-row"><span class="dk">BACKEND</span><span class="dv">'+(b.backend||'unknown')+'</span></div>';
 html+='<div class="d-row"><span class="dk">FILES</span><span class="dv">'+(b.file_count||0)+'</span></div>';
 html+='<div class="d-row"><span class="dk">STATUS</span><span class="dv" style="color:#ff0040">● ONLINE</span></div>';
 
 // Count agents in this region
 var agentsInRegion=Object.keys(positions).filter(function(n){return positions[n].region===name});
 if(agentsInRegion.length>0){
  html+='<div style="margin-top:6px;font-size:7px;color:#ff004060;letter-spacing:1px">AGENTS IN REGION</div>';
  for(var i=0;i<agentsInRegion.length;i++){
   var aName=agentsInRegion[i];
   var a=agents[aName]||{};
   html+='<div class="d-row"><span class="dk">'+aName+'</span><span class="dv">'+(a.status||'?')+'</span></div>';
  }
 }
 
 document.getElementById('detail-body').innerHTML=html;
 det.style.display='block';
}

function showNeuronDetail(nid,region,isHub,pos){
 var det=document.getElementById('detail');
 document.getElementById('detail-title').textContent='NEURON #'+nid;
 
 var html='';
 html+='<div class="d-row"><span class="dk">TYPE</span><span class="dv" style="color:#ff0040">'+(isHub?'HUB':'NORMAL')+'</span></div>';
 html+='<div class="d-row"><span class="dk">REGION</span><span class="dv">'+(REGION_NAMES[region]||region)+'</span></div>';
 html+='<div class="d-row"><span class="dk">POS</span><span class="dv">('+(pos?pos.x.toFixed(2):'?')+', '+(pos?pos.y.toFixed(2):'?')+', '+(pos?pos.z.toFixed(2):'?')+')</span></div>';
 
 // Count synapses
 var synCount=0;
 for(var k=0;k<synapseData.length;k++){
  if(synapseData[k].i===nid||synapseData[k].j===nid)synCount++;
 }
 html+='<div class="d-row"><span class="dk">SYNAPSES</span><span class="dv">'+synCount+'</span></div>';
 html+='<div class="d-row"><span class="dk">FIRED</span><span class="dv">'+(neuronFireTimes[nid]>0?'● ACTIVE':'○ IDLE')+'</span></div>';
 html+='<div class="d-row"><span class="dk">LAST FIRE</span><span class="dv">'+(neuronFireTimes[nid]>0?(clock.getElapsedTime()-neuronFireTimes[nid]).toFixed(2)+'s ago':'never')+'</span></div>';
 
 // Trigger a visual fire on this neuron
 fireNeuron(nid);
 
 document.getElementById('detail-body').innerHTML=html;
 det.style.display='block';
}

// ═══════════════════════════════════════════════════════════════════
// NEURON GENERATION
// ═══════════════════════════════════════════════════════════════════

function generateNeurons(){
 var rks=Object.keys(REGION_POS);
 for(var i=0;i<NEURON_COUNT;i++){
  var isHub=i<HUB_COUNT;
  neuronIsHub.push(isHub);
  var rk=rks[Math.floor(Math.random()*rks.length)];
  neuronRegionMap.push(rk);
  var rp=REGION_POS[rk];
  var spread=isHub?1.5:2;
  neuronPositions.push(new THREE.Vector3(
   rp.x+(Math.random()-0.5)*spread,
   rp.y+(Math.random()-0.5)*1,
   rp.z+(Math.random()-0.5)*spread
  ));
 }
 
 // Compute synapses
 var maxDist=2.8;
 for(var i=0;i<NEURON_COUNT;i++){
 for(var j=i+1;j<NEURON_COUNT;j++){
  var d=neuronPositions[i].distanceTo(neuronPositions[j]);
  if(d<maxDist&&Math.random()<0.15){
   synapseData.push({i:i,j:j,dist:d,phase:Math.random()});
   if(synapseData.length>=MAX_SYNAPSES)break;
  }
 }
 if(synapseData.length>=MAX_SYNAPSES)break;
 }
}

// ═══════════════════════════════════════════════════════════════════
// ELECTRIC ARCS (lightning between firing neurons)
// ═══════════════════════════════════════════════════════════════════

var MAX_ARCS=6;
var arcPool=[];

function initArcPool(){
 for(var i=0;i<MAX_ARCS;i++){
  var geo=new THREE.BufferGeometry();
  var positions=new Float32Array(12*3); // 12 segments per arc
  geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
  var mat=new THREE.LineBasicMaterial({
   color:0xff0040,transparent:true,opacity:0,
   blending:THREE.AdditiveBlending,depthWrite:false
  });
  var line=new THREE.Line(geo,mat);
  line.visible=false;
  scene.add(line);
  arcPool.push({line:line,geo:geo,alive:false,t:0,life:0.3});
 }
}

function spawnArc(start,end,color){
 for(var i=0;i<arcPool.length;i++){
  var arc=arcPool[i];
  if(!arc.alive){
   arc.alive=true;
   arc.t=0;
   arc.life=0.15+Math.random()*0.2;
   arc.line.visible=true;
   arc.line.material.color.setHex(color||0xff0040);
   arc.line.material.opacity=0.8;
   
   // Build jagged lightning path
   var posArr=arc.geo.attributes.position.array;
   var segs=11;
   for(var s=0;s<=segs;s++){
    var frac=s/segs;
    var x=start.x+(end.x-start.x)*frac;
    var y=start.y+(end.y-start.y)*frac;
    var z=start.z+(end.z-start.z)*frac;
    // Add jitter for lightning effect
    if(s>0&&s<segs){
     var jitter=0.15*(1-Math.abs(frac-0.5)*2);
     x+=(Math.random()-0.5)*jitter;
     y+=(Math.random()-0.5)*jitter;
     z+=(Math.random()-0.5)*jitter;
    }
    posArr[s*3]=x;
    posArr[s*3+1]=y;
    posArr[s*3+2]=z;
   }
   arc.geo.attributes.position.needsUpdate=true;
   return;
  }
 }
}

function updateArcs(dt){
 for(var i=0;i<arcPool.length;i++){
  var arc=arcPool[i];
  if(!arc.alive)continue;
  arc.t+=dt;
  if(arc.t>=arc.life){
   arc.alive=false;
   arc.line.visible=false;
   arc.line.material.opacity=0;
   continue;
  }
  // Fade out + flicker
  var fade=1-arc.t/arc.life;
  arc.line.material.opacity=fade*0.6*(0.5+Math.random()*0.5);
  
  // Re-jitter for flickering effect
  var posArr=arc.geo.attributes.position.array;
  // Just jitter the middle segments slightly each frame
  for(var s=1;s<11;s++){
   posArr[s*3]+=(Math.random()-0.5)*0.02;
   posArr[s*3+1]+=(Math.random()-0.5)*0.02;
   posArr[s*3+2]+=(Math.random()-0.5)*0.02;
  }
  arc.geo.attributes.position.needsUpdate=true;
 }
}

// HOLOGRAPHIC GRID FLOOR
// ═══════════════════════════════════════════════════════════════════

var gridMesh=null;

function buildGridFloor(){
 var gridSize=20;
 var gridDiv=20;
 var geo=new THREE.BufferGeometry();
 var verts=[];
 var step=gridSize/gridDiv;
 var half=gridSize/2;
 // Horizontal lines
 for(var i=0;i<=gridDiv;i++){
  var z=-half+i*step;
  verts.push(-half,-2,z, half,-2,z);
 }
 // Vertical lines
 for(var i=0;i<=gridDiv;i++){
  var x=-half+i*step;
  verts.push(x,-2,-half, x,-2,half);
 }
 geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
 var mat=new THREE.LineBasicMaterial({
  color:0x110808,transparent:true,opacity:0.3,
  blending:THREE.AdditiveBlending,depthWrite:false
 });
 gridMesh=new THREE.LineSegments(geo,mat);
 scene.add(gridMesh);
}

function spawnPulse(start,end,color,speed){
 for(var i=0;i<pulsePool.length;i++){
  var p=pulsePool[i];
  if(!p.alive){
   p.start.copy(start);
   p.end.copy(end);
   p.t=0;
   p.speed=speed||3;
   p.dist=start.distanceTo(end)||1;
   p.alive=true;
   p.mesh.visible=true;
   p.mesh.material.color.setHex(color||0xff0040);
   return;
  }
 }
}

function updatePulses(dt){
 for(var i=0;i<pulsePool.length;i++){
  var p=pulsePool[i];
  if(!p.alive)continue;
  p.t+=dt*p.speed/p.dist;
  if(p.t>=1){
   p.alive=false;
   p.mesh.visible=false;
   p.mesh.material.opacity=0;
   continue;
  }
  p.mesh.position.lerpVectors(p.start,p.end,p.t);
  p.mesh.material.opacity=Math.sin(p.t*Math.PI)*0.8;
 }
}

// ═══════════════════════════════════════════════════════════════════
// NEURAL FIRING — HIGH ELECTRICAL ACTIVITY
// ═══════════════════════════════════════════════════════════════════

function fireNeuron(idx){
 if(idx<0||idx>=NEURON_COUNT)return;
 neuronFireTimes[idx]=clock.getElapsedTime();
 
 // Propagate to connected neurons with higher probability
 for(var k=0;k<synapseData.length;k++){
  var s=synapseData[k];
  if(s.i===idx||s.j===idx){
   if(Math.random()<0.35){ // 35% propagation chance (up from 15%)
    var target=s.i===idx?s.j:s.i;
    (function(ti,idx2,dist){
     setTimeout(function(){
      fireNeuron(ti);
      spawnPulse(neuronPositions[idx2],neuronPositions[ti],0xff0040,5);
      // Spawn electric arc for close-range firings
      if(dist<2.0){
       spawnArc(neuronPositions[idx2],neuronPositions[ti],0xff0040);
      }
     },dist*25);
    })(target,idx,s.dist);
   }
  }
 }
}

function animateNeuronsInstanced(time){
 var color=new THREE.Color();
 for(var i=0;i<NEURON_COUNT;i++){
  var isHub=neuronIsHub[i];
  var ft=neuronFireTimes[i];
  var coreColor=isHub?0xff0040:0xff2244;
  
  // Hub neurons always pulse
  if(isHub){
   var phase=time*2.0+i*0.5;
   var pulse=Math.sin(phase)*0.5+0.5;
   // Blend between base and bright
   var r=1.0;
   var g=pulse*0.15;
   var b=pulse*0.25+0.15;
   coreColor=null; // signal to use r,g,b directly
  }
  
  // Fire recovery — brighter and longer lasting
  if(ft>0){
   var elapsed=time-ft;
   if(elapsed<0.6){ // 0.6s fire duration (up from 0.4)
    var decay=1-elapsed*1.67;
    if(coreColor===null){
     r=1.0;g=0.3*decay+0.15;b=0.4*decay+0.15;
    }else{
     coreColor=0xff6080; // brighter flash
    }
   }else{
    neuronFireTimes[i]=0;
   }
  }
  
  if(coreColor!==null){
   color.setHex(coreColor);
  }else{
   color.setRGB(r,g,b);
  }
  neuronInstMesh.setColorAt(i,color);
 }
 neuronInstMesh.instanceColor.needsUpdate=true;
}

function randomFire(time){
 // Much higher fire rate for visible electrical activity
 if(time>nextFire){
  // Fire 1-3 neurons per cycle
  var burstCount=1+Math.floor(Math.random()*2);
  for(var b=0;b<burstCount;b++){
   var idx=Math.floor(Math.random()*NEURON_COUNT);
   if(neuronIsHub[idx]||Math.random()<0.4){ // 40% chance for non-hubs
    fireNeuron(idx);
   }
  }
  nextFire=time+0.15+Math.random()*0.35; // faster interval: 0.15-0.5s (was 0.3-1.1s)
 }
}

// ═══════════════════════════════════════════════════════════════════
// AGENT POSITION UPDATES
// ═══════════════════════════════════════════════════════════════════

function updateAgents(dt){
 var time=clock.getElapsedTime();
 var names=Object.keys(agentOrbs);
 for(var n=0;n<names.length;n++){
  var name=names[n];
  var orb=agentOrbs[name];
  var pos=positions[name];
  
  if(pos&&pos.region){
   var rp=REGION_POS[pos.region]||REGION_POS.semantic;
   orb.targetPos.set(pos.x||rp.x,pos.y||rp.y,pos.z||rp.z);
   
 if(!orb.visible){
 orb.visible=true;
 orb.currentPos.copy(orb.targetPos);
 orb.core.position.copy(orb.currentPos);
 orb.glow.position.copy(orb.currentPos);
 orb.label.position.set(orb.currentPos.x,orb.currentPos.y+0.2,orb.currentPos.z);
 if(orb.hitbox)orb.hitbox.position.copy(orb.currentPos);
 }
   orb.active=true;
  }else{
   orb.active=false;
  }
  
  if(orb.visible){
 orb.currentPos.lerp(orb.targetPos,dt*1.5);
 orb.core.position.copy(orb.currentPos);
 orb.glow.position.copy(orb.currentPos);
 orb.label.position.set(orb.currentPos.x,orb.currentPos.y+0.2,orb.currentPos.z);
 if(orb.hitbox)orb.hitbox.position.copy(orb.currentPos);
   
   var tOp=orb.active?0.8:0.1;
   orb.core.material.opacity+=(tOp-orb.core.material.opacity)*dt*2;
   orb.glow.material.opacity+=((orb.active?0.12:0.02)-orb.glow.material.opacity)*dt*2;
   orb.label.material.opacity+=((orb.active?0.4:0.05)-orb.label.material.opacity)*dt*2;
   
   // Breathing + rotation for active agents
   var breathe=Math.sin(time*1.5+name.length)*0.01;
   orb.glow.scale.setScalar(1+breathe);
   
   // Active agents emit small electrical pulses to nearby neurons
   if(orb.active&&Math.random()<0.008){ // occasional auto-fire
    var closestIdx=-1;
    var closestDist=999;
    for(var i=0;i<NEURON_COUNT;i++){
     var d=orb.currentPos.distanceTo(neuronPositions[i]);
     if(d<closestDist&&d<2.0){
      closestDist=d;
      closestIdx=i;
     }
    }
    if(closestIdx>=0){
     fireNeuron(closestIdx);
     spawnArc(orb.currentPos,neuronPositions[closestIdx],AGENT_COLORS[name]||0xff0040);
    }
   }
  }
 }
}

// ═══════════════════════════════════════════════════════════════════
// MAIN ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════════

function animate(){
 requestAnimationFrame(animate);
 var dt=Math.min(clock.getDelta(),0.1);
 var time=clock.getElapsedTime();
 
 // Camera auto-rotate (slower when dragging)
 if(!isDragging)camAngle+=dt*0.12;
 cam.position.x=Math.sin(camAngle)*camRadius;
 cam.position.z=Math.cos(camAngle)*camRadius;
 cam.position.y=camHeight;
 cam.lookAt(0,0,0);
 
 // Scene updates
 animateNeuronsInstanced(time);
 randomFire(time);
 updateAgents(dt);
 updatePulses(dt);
 updateArcs(dt);
 
 // Synapse pulse — more visible
 var sp=(time*0.3)%1;
 synapseLineSegs.material.opacity=0.08+Math.sin(sp*Math.PI)*0.06;
 
 // Grid floor subtle pulse
 if(gridMesh){
  gridMesh.material.opacity=0.2+Math.sin(time*0.5)*0.08;
  // Grid scan line effect
  var scanZ=-10+((time*2)%20);
  gridMesh.position.z=Math.sin(time*0.3)*0.1;
 }
 
 // Slow starfield rotation
 if(starfieldMesh)starfieldMesh.rotation.y=time*0.01;
 
 // Region core breathing
 var rNames=Object.keys(regionMeshes);
 for(var i=0;i<rNames.length;i++){
  var rm=regionMeshes[rNames[i]];
  var scale=1+Math.sin(time*0.8+i)*0.05;
  rm.scale.setScalar(scale);
  rm.material.opacity=0.1+Math.sin(time*1.2+i*0.7)*0.04;
 }
 
 ren.render(scene,cam);
 
 // Bloom copy
 if(window._bloomCtx&&window._bloomCv){
  try{
   window._bloomCtx.drawImage(ren.domElement,0,0,window._bloomCv.width,window._bloomCv.height);
  }catch(e){}
 }
}

function onResize(){
 cam.aspect=window.innerWidth/window.innerHeight;
 cam.updateProjectionMatrix();
 ren.setSize(window.innerWidth,window.innerHeight);
 if(window._bloomCv){
  window._bloomCv.width=Math.floor(window.innerWidth/4);
  window._bloomCv.height=Math.floor(window.innerHeight/4);
  window._bloomCv.style.width=window.innerWidth+'px';
  window._bloomCv.style.height=window.innerHeight+'px';
 }
}

function connectWS(){
 try{
  ws=new WebSocket('ws://localhost:8199/ws');
  ws.onopen=function(){document.getElementById('api-status').textContent='WS LIVE';wsReconnect=0};
  ws.onmessage=function(e){
   try{
    var msg=JSON.parse(e.data);
    if(msg.type==='agent_positions')positions=msg.data;
    if(msg.type==='activity'){activityFeed.unshift(msg.data);if(activityFeed.length>50)activityFeed.pop();updateFeed()}
    if(msg.type==='init'){agents=msg.agents;positions=msg.positions;regions=msg.regions}
    updateHUD();
   }catch(ex){}
  };
  ws.onclose=function(){wsReconnect++;setTimeout(connectWS,Math.min(wsReconnect*2,30)*1000)};
  ws.onerror=function(){ws.close()};
 }catch(e){
  document.getElementById('api-status').textContent='POLLING';
  setInterval(loadAll,3000);
 }
}

// ═══════════════════════════════════════════════════════════════════
// HUD UPDATE
// ═══════════════════════════════════════════════════════════════════

function updateHUD(){
 var list=document.getElementById('agent-list');
 var sorted=Object.entries(agents).sort(function(a,b){return(a[1].status==='active'?0:1)-(b[1].status==='active'?0:1)});
 var activeCount=sorted.filter(function(x){return x[1].status==='active'}).length;
 document.getElementById('agent-count').textContent=sorted.length+' detected — '+activeCount+' active';
 
 var html='';
 for(var i=0;i<sorted.length;i++){
  var name=sorted[i][0],info=sorted[i][1];
  var pos=positions[name];
  var fileStr=pos&&pos.file?' → '+pos.file:'';
  var actionStr=pos&&pos.action?'['+pos.action+']':'';
  var colorHex='#'+(AGENT_COLORS[name]||0xff0040).toString(16).padStart(6,'0');
  html+='<div class="agent-card '+info.status+'" data-agent="'+name+'">';
  html+='<div class="agent-name"><span class="dot '+(info.status==='active'?'on':'off')+'" style="background:'+colorHex+'"></span>'+name+'</div>';
  html+='<div class="agent-meta">'+info.type+(fileStr?' · ':'')+fileStr+' '+actionStr+'</div>';
  if(pos)html+='<div class="agent-pos">@ '+(REGION_NAMES[pos.region]||pos.region)+' ('+(pos.x||0).toFixed(1)+', '+(pos.y||0).toFixed(1)+', '+(pos.z||0).toFixed(1)+')</div>';
  html+='</div>';
 }
 list.innerHTML=html;
 
 var rList=document.getElementById('region-list');
 var rHtml='';
 var bKeys=Object.keys(brain);
 for(var i=0;i<bKeys.length;i++){
  var info=brain[bKeys[i]];
  rHtml+='<div class="region-item" data-region="'+bKeys[i]+'"><span>●</span>'+(REGION_NAMES[bKeys[i]]||info.name)+' — '+info.backend+' — '+info.file_count+' files</div>';
 }
 rList.innerHTML=rHtml;
 
 // Region click handlers
 rList.querySelectorAll('.region-item').forEach(function(ri){
  ri.onclick=function(){
   var rn=ri.dataset.region;
   showRegionDetail(rn);
   focusOnPosition(REGION_POS[rn]);
  };
 });
 
 var totalFiles=0;
 var bv=Object.values(brain);
 for(var i=0;i<bv.length;i++)totalFiles+=bv[i].file_count||0;
 document.getElementById('brain-status').textContent=activeCount+' agents · '+totalFiles+' files';
 
 // Drive sync info
 var driveEl=document.getElementById('drive-info');
 if(driveEl){
  var dHtml='';
  dHtml+='<div class="stat-row"><span class="k">STORAGE</span><span class="v">Google Drive (1TB)</span></div>';
  dHtml+='<div class="stat-row"><span class="k">FOLDER</span><span class="v">AkpanBrain/</span></div>';
  dHtml+='<div class="stat-row"><span class="k">SYNC</span><span class="v" style="color:#ff0040">● rclone bidirectional</span></div>';
  dHtml+='<div class="stat-row"><span class="k">BRAIN</span><span class="v">'+totalFiles+' files synced</span></div>';
  var rKeys=Object.keys(brain);
  for(var i=0;i<rKeys.length;i++){
   var info=brain[rKeys[i]];
   dHtml+='<div class="stat-row"><span class="k"> '+(REGION_NAMES[rKeys[i]]||info.name).toUpperCase()+'</span><span class="v">'+info.backend+' · '+(info.file_count||0)+' files</span></div>';
  }
  dHtml+='<div class="stat-row"><span class="k">SNAPSHOTS</span><span class="v">v5-neural-mvp, v6-instanced</span></div>';
  dHtml+='<div class="stat-row"><span class="k">LAST SYNC</span><span class="v">'+new Date().toLocaleTimeString('en',{hour12:false})+'</span></div>';
  driveEl.innerHTML=dHtml;
 }
}

function updateFeed(){
 var feedEl=document.getElementById('feed');
 var html='';
 var items=activityFeed.slice(0,30);
 for(var i=0;i<items.length;i++){
  var e=items[i];
  var ts=new Date(e.ts).toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  html+='<div class="feed-item"><span class="ts">'+ts+'</span>'+e.agent+' '+e.action+' '+(e.target||'')+'</div>';
 }
 feedEl.innerHTML=html;
 document.getElementById('feed-count').textContent=activityFeed.length+' events';
}

// ═══════════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════════

document.querySelectorAll('.tab').forEach(function(tab){
 tab.onclick=function(){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  tab.classList.add('active');
  ['agents','brain','feed','drive'].forEach(function(t){
   document.getElementById('tab-'+t).style.display=t===tab.dataset.tab?'block':'none';
  });
 };
});

// ═══════════════════════════════════════════════════════════════════
// AGENT CLICK IN HUD → FOCUS + DETAIL
// ═══════════════════════════════════════════════════════════════════

document.getElementById('agent-list').onclick=function(e){
 var card=e.target.closest('.agent-card');
 if(!card)return;
 var name=card.dataset.agent;
 showAgentDetail(name);
 focusOnAgent(name);
};

// ═══════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════

async function boot(){
 try{init3D()}catch(e){console.error('init3D err:',e);return}
 
 // Init electric arcs after scene is ready
 initArcPool();
 
 if(EMBEDDED&&EMBEDDED.agents){
  agents=EMBEDDED.agents;brain=EMBEDDED.brain||{};
  positions=EMBEDDED.positions||{};regions=EMBEDDED.regions||{};
 }
 
 try{await loadAll()}catch(e){}
 try{updateHUD()}catch(e){}
 try{connectWS()}catch(e){}
 setInterval(loadAll,5000);
}

boot().catch(function(e){console.error('Boot failed:',e);try{init3D()}catch(e2){}document.getElementById('ld').textContent='PARTIAL LOAD'});
</script>
