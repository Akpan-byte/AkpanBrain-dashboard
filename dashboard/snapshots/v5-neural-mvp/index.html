<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--panel:rgba(15,15,15,0.92);--border:#1a1a1a;--red:#ff0040;--silver:#c0c0c0;--dim:#333;--glow:#ff004060}
body{background:var(--bg);color:var(--silver);font-family:'Courier New',monospace;overflow:hidden;height:100vh;width:100vw}
#cv{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
#hud{position:fixed;top:0;right:0;width:320px;height:100vh;z-index:10;overflow-y:auto;background:var(--panel);border-left:1px solid var(--border);scrollbar-width:thin;scrollbar-color:#333 transparent}
#hud::-webkit-scrollbar{width:4px}
#hud::-webkit-scrollbar-thumb{background:#333}
.hdr{padding:12px 16px;border-bottom:1px solid var(--border)}
.hdr h2{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--red)}
.hdr .sub{font-size:9px;color:#555;margin-top:2px}
.stat-row{display:flex;justify-content:space-between;padding:6px 16px;font-size:10px;border-bottom:1px solid #111}
.stat-row .k{color:#666}.stat-row .v{color:var(--silver)}

.agent-card:hover{background:#1a1a1a}
.agent-card.active{border-left:2px solid var(--red)}
.agent-card.inactive{border-left:2px solid #222;opacity:0.4}

.agent-meta{font-size:9px;color:#555;margin-top:2px}

// ─── 3D SCENE ───
function init3D(){
 scene=new THREE.Scene();
 scene.fog=new THREE.FogExp2(0x0a0a0a,0.04);
 
 cam=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,200);
 cam.position.set(0,2,8);
 cam.lookAt(0,0,0);
 
 ren=new THREE.WebGLRenderer({canvas:document.getElementById('cv'),antialias:true,alpha:false});
 ren.setPixelRatio(Math.min(window.devicePixelRatio,2));
 ren.setSize(window.innerWidth,window.innerHeight);
 ren.setClearColor(0x0a0a0a,1);
 ren.toneMapping=THREE.ACESFilmicToneMapping;
 ren.toneMappingExposure=1.2;
 
 // Simple auto-rotation camera (no OrbitControls needed)
 let camAngle=0,camRadius=8,camHeight=2;
 let isDragging=false,dragStart={x:0,y:0},dragAngle=0,dragHeight=0;
 
 ren.domElement.addEventListener('pointerdown',e=>{isDragging=true;dragStart={x:e.clientX,y:e.clientY};dragAngle=camAngle;dragHeight=camHeight});
 window.addEventListener('pointerup',()=>{isDragging=false});
 window.addEventListener('pointermove',e=>{
  if(!isDragging)return;
  camAngle=dragAngle+(e.clientX-dragStart.x)*0.005;
  camHeight=dragHeight-(e.clientY-dragStart.y)*0.01;
  camHeight=Math.max(-3,Math.min(8,camHeight));
 });
 ren.domElement.addEventListener('wheel',e=>{camRadius+=e.deltaY*0.005;camRadius=Math.max(3,Math.min(20,camRadius));e.preventDefault()},{passive:false});
 
 window._updateCamera=function(dt){
  if(!isDragging)camAngle+=dt*0.15; // Auto-rotate
  cam.position.x=Math.sin(camAngle)*camRadius;
  cam.position.z=Math.cos(camAngle)*camRadius;
  cam.position.y=camHeight;
  cam.lookAt(0,0,0);
 };
 
 // Ambient + point lights
 scene.add(new THREE.AmbientLight(0x111111,0.5));
 const redLight=new THREE.PointLight(0xff0040,2,20);
 redLight.position.set(0,3,0);
 scene.add(redLight);
 const dimLight=new THREE.PointLight(0x404040,1,30);
 dimLight.position.set(-5,-3,5);
 scene.add(dimLight);
 
 buildNeuralNetwork();
 buildRegionCores();
 buildAgentOrbs();
 buildSynapses();
 
 // Pulse group for electrical effects
 pulseGroup=new THREE.Group();
 scene.add(pulseGroup);
 
 window.addEventListener('resize',onResize);
 document.getElementById('ld').style.display='none';
 window.__booted=true;
 window.__scene=scene;
 window.__neuronCount=neuronNodes.length;
 window.__agentMeshes=Object.keys(agentMeshes).length;
 animate();
}

// ─── NEURAL NETWORK: Neurons (spheres) + Synapses (lines) + Pulses (traveling particles) ───
function buildNeuralNetwork(){
 const neuronCount=60;
 const spread=6;
 
 // Create neuron positions clustered around regions
 const neuronPositions=[];
 for(let i=0;i<neuronCount;i++){
  // Bias towards region centers
  const regionKeys=Object.keys(REGION_POS);
  const rk=regionKeys[Math.floor(Math.random()*regionKeys.length)];
  const rp=REGION_POS[rk];
  const x=rp.x+(Math.random()-0.5)*2.5;
  const y=rp.y+(Math.random()-0.5)*1.5;
  const z=rp.z+(Math.random()-0.5)*2.5;
  neuronPositions.push(new THREE.Vector3(x,y,z));
 }
 
 // Create neurons as glowing spheres with inner+outer
 const neuronGeo=new THREE.SphereGeometry(0.06,8,6);
 const neuronGeoLg=new THREE.SphereGeometry(0.1,8,6);
 
 for(let i=0;i<neuronCount;i++){
  const pos=neuronPositions[i];
  const isLarge=i<20; // Some neurons are larger (hub neurons)
  const geo=isLarge?neuronGeoLg:neuronGeo;
  
  // Inner bright core
  const innerMat=new THREE.MeshBasicMaterial({
   color:isLarge?0xff0040:0xff2244,
   transparent:true,opacity:isLarge?0.9:0.4
  });
  const inner=new THREE.Mesh(geo,innerMat);
  inner.position.copy(pos);
  scene.add(inner);
  
  // Outer glow shell
  const outerMat=new THREE.MeshBasicMaterial({
   color:isLarge?0xff0040:0xff0020,
   transparent:true,opacity:0.08,
   blending:THREE.AdditiveBlending,depthWrite:false
  });
  const outer=new THREE.Mesh(new THREE.SphereGeometry(isLarge?0.25:0.15,8,6),outerMat);
  outer.position.copy(pos);
  scene.add(outer);
  
  neuronNodes.push({inner,outer,pos:pos.clone(),isLarge,idx:i,fireTime:0});
 }
 
 // Create synapses (connections between nearby neurons)
 const maxDist=3.0;
 const synapseMat=new THREE.LineBasicMaterial({
  color:0x331111,transparent:true,opacity:0.15,
  blending:THREE.AdditiveBlending,depthWrite:false
 });
 
 for(let i=0;i<neuronCount;i++){
  for(let j=i+1;j<neuronCount;j++){
   const d=neuronPositions[i].distanceTo(neuronPositions[j]);
   if(d<maxDist&&Math.random()<0.2){
    const geo=new THREE.BufferGeometry().setFromPoints([neuronPositions[i],neuronPositions[j]]);
    const line=new THREE.Line(geo,synapseMat.clone());
    scene.add(line);
    synapseLines.push({line,i,j,dist:d,pulsePhase:Math.random()});
   }
  }
 }
}

// ─── REGION CORES: Large glowing spheres at each region center ───
function buildRegionCores(){
 for(const[name,pos]of Object.entries(REGION_POS)){
  const color=REGION_COLORS[name]||0xff0000;
  
  // Core sphere
  const coreMat=new THREE.MeshBasicMaterial({
   color,transparent:true,opacity:0.15,
   blending:THREE.AdditiveBlending,depthWrite:false
  });
  const core=new THREE.Mesh(new THREE.SphereGeometry(0.4,16,12),coreMat);
  core.position.set(pos.x,pos.y,pos.z);
  scene.add(core);
  
  // Outer aura
  const auraMat=new THREE.MeshBasicMaterial({
   color,transparent:true,opacity:0.03,
   blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.DoubleSide
  });
  const aura=new THREE.Mesh(new THREE.SphereGeometry(0.8,16,12),auraMat);
  aura.position.set(pos.x,pos.y,pos.z);
  scene.add(aura);
  
  // Label sprite
  const canvas=document.createElement('canvas');
  canvas.width=256;canvas.height=64;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='transparent';ctx.fillRect(0,0,256,64);
  ctx.font='bold 16px monospace';ctx.textAlign='center';
  ctx.fillStyle='#'+color.toString(16).padStart(6,'0');
  ctx.fillText(name.toUpperCase(),128,32);
  const tex=new THREE.CanvasTexture(canvas);
  const spriteMat=new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0.6,blending:THREE.AdditiveBlending});
  const sprite=new THREE.Sprite(spriteMat);
  sprite.position.set(pos.x,pos.y+0.6,pos.z);
  sprite.scale.set(1.5,0.4,1);
  scene.add(sprite);
 }
}

// ─── AGENT ORBS: Glowing spheres that move between regions ───
function buildAgentOrbs(){
 for(const[name,color]of Object.entries(AGENT_COLORS)){
  // Agent orb — bright core + glow + trail

  });

  label.scale.set(0.8,0.1,1);
  scene.add(label);
  
  agentMeshes[name]={core,glow,trail,label,visible:false,targetPos:new THREE.Vector3(),currentPos:new THREE.Vector3(),trailPoints:[],active:false};
 }

// ─── ELECTRICAL PULSE SYSTEM ───
let pulseGroup=null;

class ElectricalPulse{
 constructor(start,end,color=0xff0040,speed=2){
  this.start=start.clone();
  this.end=end.clone();
  this.t=0;
  this.speed=speed;
  this.alive=true;
  this.dir=end.clone().sub(start);
  this.dist=this.dir.length();
  this.dir.normalize();
  
  // Pulse particle — bright point
  const mat=new THREE.MeshBasicMaterial({
   color,transparent:true,opacity:0.8,
   blending:THREE.AdditiveBlending,depthWrite:false
  });
  this.mesh=new THREE.Mesh(new THREE.SphereGeometry(0.03,6,4),mat);
  
  // Trail line
  const trailMat=new THREE.LineBasicMaterial({
   color,transparent:true,opacity:0.3,
   blending:THREE.AdditiveBlending,depthWrite:false
  });
  this.trailGeo=new THREE.BufferGeometry();
  this.trail=new THREE.Line(this.trailGeo,trailMat);
  
  pulseGroup.add(this.mesh);
  pulseGroup.add(this.trail);
 }
 
 update(dt){
  this.t+=dt*this.speed/this.dist;
  if(this.t>=1){this.alive=false;return}
  const pos=this.start.clone().lerp(this.end,this.t);
  this.mesh.position.copy(pos);
  this.mesh.material.opacity=Math.sin(this.t*Math.PI)*0.8;
  
  // Trail: last few positions
  const trailLen=0.15;
  const t0=Math.max(0,this.t-trailLen);
  const p0=this.start.clone().lerp(this.end,t0);
  this.trailGeo.setFromPoints([p0,pos]);
  this.trail.material.opacity=Math.sin(this.t*Math.PI)*0.4;
 }
 
 dispose(){
  pulseGroup.remove(this.mesh);
  pulseGroup.remove(this.trail);
  this.mesh.geometry.dispose();this.mesh.material.dispose();
  this.trail.geometry.dispose();this.trail.material.dispose();
 }
}

// ─── NEURAL FIRING EFFECT ───
function fireNeuron(neuronIdx){
 const n=neuronNodes[neuronIdx];
 if(!n)return;
 n.fireTime=clock.getElapsedTime();
 n.inner.material.opacity=1.0;
 n.inner.material.color.setHex(0xff4060);
 n.outer.material.opacity=0.3;
 
 // Spawn pulses to connected neurons
 for(const s of synapseLines){
  if(s.i===neuronIdx||s.j===neuronIdx){
   if(Math.random()<0.3){ // Don't fire all at once
    const targetIdx=s.i===neuronIdx?s.j:s.i;
    const target=neuronNodes[targetIdx];
    setTimeout(()=>{
     fireNeuron(targetIdx);
     pulseParticles.push(new ElectricalPulse(n.pos,target.pos,0xff0040,3));
    },s.dist*50); // Delay proportional to distance
   }
  }
 }
}

// ─── UPDATE AGENT POSITIONS (smooth movement) ───
function updateAgentPositions(dt){
 for(const[name,mesh]of Object.entries(agentMeshes)){
  const pos=positions[name];
  if(pos&&pos.region){
   const rp=REGION_POS[pos.region]||REGION_POS.semantic;
   const target=new THREE.Vector3(pos.x||rp.x,pos.y||rp.y,pos.z||rp.z);
   
   if(!mesh.visible){
    // First appearance — fade in
    mesh.visible=true;
    mesh.currentPos.copy(target);
    mesh.core.position.copy(target);
    mesh.glow.position.copy(target);
    mesh.label.position.copy(target.clone().add(new THREE.Vector3(0,0.25,0)));
    mesh.core.material.opacity=0.9;
    mesh.glow.material.opacity=0.15;
    mesh.label.material.opacity=0.5;
   }
   
   mesh.targetPos.copy(target);
   mesh.active=true;
  }else{
   mesh.active=false;
  }
  
  if(mesh.visible){
   // Smooth lerp to target
   mesh.currentPos.lerp(mesh.targetPos,dt*2);
   mesh.core.position.copy(mesh.currentPos);
   mesh.glow.position.copy(mesh.currentPos);
   mesh.label.position.copy(mesh.currentPos.clone().add(new THREE.Vector3(0,0.25,0)));
   
   // Breathing effect
   const breathe=Math.sin(clock.getElapsedTime()*2+name.length)*0.02;
   mesh.glow.scale.setScalar(1+breathe);
   
   // Opacity based on active status
   const targetOpacity=mesh.active?0.9:0.15;
   mesh.core.material.opacity+=(targetOpacity-mesh.core.material.opacity)*dt*3;
   mesh.glow.material.opacity+=((mesh.active?0.15:0.03)-mesh.glow.material.opacity)*dt*3;
   mesh.label.material.opacity+=((mesh.active?0.5:0.1)-mesh.label.material.opacity)*dt*3;
   
   // Trail — record positions
   mesh.trailPoints.push(mesh.currentPos.clone());
   if(mesh.trailPoints.length>30)mesh.trailPoints.shift();
   if(mesh.trailPoints.length>2){
    mesh.trail.geometry.setFromPoints(mesh.trailPoints);
    mesh.trail.material.opacity=mesh.active?0.2:0.05;
   }
   
   // Agent moving between regions → spawn electrical pulse along the path
   if(mesh.active&&mesh.trailPoints.length>5){
    const lastPos=mesh.trailPoints[mesh.trailPoints.length-1];
    const prevPos=mesh.trailPoints[mesh.trailPoints.length-5];
    if(lastPos.distanceTo(prevPos)>0.5){
     // Agent moved significantly — spawn trail pulse
     if(Math.random()<0.02){
      pulseParticles.push(new ElectricalPulse(prevPos,lastPos,AGENT_COLORS[name]||0xff0040,2));
     }
    }
   }
  }
 }
}

// ─── ANIMATE NEURONS (firing, pulsing, glow) ───
function animateNeurons(time){
 for(const n of neuronNodes){
  if(n.isLarge){
   const phase=time*1.5+n.idx*0.5;
   const pulse=Math.sin(phase)*0.03+0.06;
   n.outer.material.opacity=pulse;
   n.inner.material.opacity=0.5+Math.sin(phase)*0.2;
  }
  
  // Fire recovery
  if(n.fireTime>0){
   const elapsed=time-n.fireTime;
   if(elapsed<0.5){
    const decay=1-elapsed*2;
    n.inner.material.opacity=0.5+decay*0.5;
    n.outer.material.opacity=0.08+decay*0.2;
   }else{
    n.fireTime=0;
    n.inner.material.opacity=n.isLarge?0.5:0.3;
    n.inner.material.color.setHex(n.isLarge?0xff0040:0xff2244);
    n.outer.material.opacity=n.isLarge?0.06:0.03;
   }
  }
 }
}

// ─── RANDOM NEURAL FIRING (background activity) ───
let nextFire=0;
function randomFire(time){
 if(time>nextFire){
  const idx=Math.floor(Math.random()*neuronNodes.length);
  if(neuronNodes[idx].isLarge||Math.random()<0.3){
   fireNeuron(idx);
  }
  nextFire=time+0.1+Math.random()*0.5; // Fire every 0.1-0.6s
 }
}

// ─── UPDATE PULSE PARTICLES ───
function updatePulses(dt){
 for(let i=pulseParticles.length-1;i>=0;i--){
  pulseParticles[i].update(dt);
  if(!pulseParticles[i].alive){
   pulseParticles[i].dispose();
   pulseParticles.splice(i,1);
  }
 }
}

// ─── MAIN LOOP ───
function animate(){
 requestAnimationFrame(animate);
 const dt=Math.min(clock.getDelta(),0.1);
 const time=clock.getElapsedTime();
 
 window._updateCamera(dt);
 animateNeurons(time);
 randomFire(time);
 updateAgentPositions(dt);
 updatePulses(dt);
 
 // Synapse glow pulse
 for(const s of synapseLines){
  const phase=(time*0.5+s.pulsePhase)%1;
  s.line.material.opacity=0.05+Math.sin(phase*Math.PI)*0.1;
 }
 
 ren.render(scene,cam);
}

function onResize(){
 cam.aspect=window.innerWidth/window.innerHeight;
 cam.updateProjectionMatrix();
 ren.setSize(window.innerWidth,window.innerHeight);
}

// ─── DATA FETCHING ───
async function fetchAPI(path){
 try{
  const r=await fetch(`http://localhost:8199${path}`,{signal:AbortSignal.timeout(3000)});
  return await r.json();
 }catch{return null}
}

async function loadAll(){
 const[a,b,p,rg]=await Promise.all([
  fetchAPI('/api/agents'),fetchAPI('/api/brain'),
  fetchAPI('/api/positions'),fetchAPI('/api/regions')
 ]);
 if(a)agents=a;
 if(b)brain=b;
 if(p)positions=p;
 if(rg)regions=rg;
 updateHUD();
}

// ─── WEBSOCKET ───
function connectWS(){
 try{
  const proto=location.protocol==='https:'?'wss:':'ws:';
  // Try direct connection to API server (works from local, not from Vercel)
  // For Vercel: fall back to polling
  const url=`ws://localhost:8199/ws`;
  ws=new WebSocket(url);
  ws.onopen=()=>{
   document.getElementById('api-status').textContent='WS LIVE';
   wsReconnect=0;
  };
  ws.onmessage=(e)=>{
   try{
    const msg=JSON.parse(e.data);
    if(msg.type==='agent_positions')positions=msg.data;
    if(msg.type==='activity'){
     activityFeed.unshift(msg.data);
     if(activityFeed.length>50)activityFeed.pop();
     updateFeed();
    }
    if(msg.type==='init'){
     agents=msg.agents;positions=msg.positions;regions=msg.regions;
    }
    updateHUD();
   }catch{}
  };
  ws.onclose=()=>{wsReconnect++;setTimeout(connectWS,Math.min(wsReconnect*2,30)*1000)};
  ws.onerror=()=>{ws.close()};
 }catch{
  // No WebSocket — use polling
  document.getElementById('api-status').textContent='POLLING';
  setInterval(loadAll,2000);
 }
}

// ─── HUD UPDATE ───
function updateHUD(){
 // Agent list
 const list=document.getElementById('agent-list');
 const sorted=Object.entries(agents).sort((a,b)=>(a[1].status==='active'?0:1)-(b[1].status==='active'?0:1));
 const activeCount=sorted.filter(([,a])=>a.status==='active').length;
 document.getElementById('agent-count').textContent=`${sorted.length} detected — ${activeCount} active`;
 
 let html='';
 for(const[name,info]of sorted){
  const pos=positions[name];
  const fileStr=pos?.file?` → ${pos.file}`:'';
  const actionStr=pos?.action?`[${pos.action}]`:'';
  html+=`<div class="agent-card ${info.status}" data-agent="${name}">
   <div class="agent-name"><span class="dot ${info.status==='active'?'on':'off'}" style="background:${info.color}"></span>${name}</div>
   <div class="agent-meta">${info.type}${fileStr?' · ':''}${fileStr} ${actionStr}</div>
   ${pos?`<div class="agent-pos">@ ${pos.region} (${(pos.x||0).toFixed(1)}, ${(pos.y||0).toFixed(1)}, ${(pos.z||0).toFixed(1)})</div>`:''}
  </div>`;
 }
 list.innerHTML=html;
 
 // Brain regions
 const rList=document.getElementById('region-list');
 let rHtml='';
 for(const[name,info]of Object.entries(brain)){
  rHtml+=`<div class="region-item"><span>●</span>${info.name} — ${info.backend} — ${info.file_count} files</div>`;
 }
 rList.innerHTML=rHtml;
 
 // Status
 document.getElementById('brain-status').textContent=`${activeCount} agents · ${Object.values(brain).reduce((s,b)=>s+b.file_count,0)} files`;
}

function updateFeed(){
 const feedEl=document.getElementById('feed');
 let html='';
 for(const e of activityFeed.slice(0,30)){
  const ts=new Date(e.ts).toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  html+=`<div class="feed-item"><span class="ts">${ts}</span>${e.agent} ${e.action} ${e.target||''}</div>`;
 }
 feedEl.innerHTML=html;
 document.getElementById('feed-count').textContent=`${activityFeed.length} events`;
}

// ─── TABS ───
document.querySelectorAll('.tab').forEach(tab=>{
 tab.onclick=()=>{
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  ['agents','brain','feed','drive'].forEach(t=>{
   document.getElementById('tab-'+t).style.display=t===tab.dataset.tab?'block':'none';
  });
 };
});

// ─── AGENT CLICK → CAMERA FOCUS ───
document.getElementById('agent-list').onclick=(e)=>{
 const card=e.target.closest('.agent-card');
 if(!card)return;
 const name=card.dataset.agent;
 const mesh=agentMeshes[name];
 if(mesh&&mesh.visible){
  controls.target.copy(mesh.currentPos);
  cam.position.copy(mesh.currentPos.clone().add(new THREE.Vector3(0,1,3)));
 }
};

// ─── BOOT ───
async function boot(){
 init3D();
 
 // Load embedded or live data
 if(EMBEDDED&&EMBEDDED.agents){
  agents=EMBEDDED.agents;brain=EMBEDDED.brain||{};
  positions=EMBEDDED.positions||{};regions=EMBEDDED.regions||{};
 }
 
 await loadAll();
 updateHUD();
 
 // Try WebSocket, fall back to polling
 connectWS();
 
 // Also poll every 5s as backup
 setInterval(loadAll,5000);
}

boot().catch(e=>{console.error('Boot failed:',e);document.getElementById('ld').textContent='ERROR: '+e.message});
</script>
